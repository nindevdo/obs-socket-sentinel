services:
  obs-socket-sentinel:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - CHAPTER_FILE=/markers/chapters.txt
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_CHANNEL_ID=${DISCORD_CHANNEL_ID}
      - HTTP_HOST=${HTTP_HOST:-0.0.0.0}
      - HTTP_PORT=${SOCKET_SENTINEL_PORT:-8088}
      - LISTEN_PORT=${LISTEN_PORT:-5678}
      - SS_TOKEN=${SS_TOKEN}
      - TEMPLATE_FILE=/app/overlay_template.html
      - WATCH_DIR=/markers
      - OBS_IP=${OBS_IP:-192.168.0.181}
      - OBS_PORT=${OBS_PORT:-4455}
      - OBS_PASSWORD=${OBS_PASSWORD}
      - VOICE_LISTENER_ENABLED=${VOICE_LISTENER_ENABLED:-false}
      - VOICE_AUDIO_PORT=${VOICE_AUDIO_PORT:-5555}
    volumes:
      - ./_data/markers:/markers:rw
      - ./_data/discord:/discord:rw
      - ./_data/sounds:/sounds:ro
    ports:
      - ${SOCKET_SENTINEL_PORT:-8088}:8088
      - ${VOICE_AUDIO_PORT:-5555}:5555/udp

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: obs-socket-sentinel-cloudflared
    restart: unless-stopped
    command: >
      tunnel --config /etc/cloudflared/config.yml --no-autoupdate run --token ${CLOUDFLARED_TUNNEL_TOKEN}
    network_mode: host
    environment:
      - CLOUDFLARED_HOSTNAME=${CLOUDFLARED_HOSTNAME:-ss.nindevdo.com}
      - CLOUDFLARED_SERVICE=http://localhost:${SOCKET_SENTINEL_PORT:-8088}
      - CLOUDFLARED_TUNNEL_ID=${CLOUDFLARED_TUNNEL_ID}
      - CLOUDFLARED_TUNNEL_ORIGIN_CERT=/etc/cloudflared/cert.pem
      - CLOUDFLARED_TUNNEL_TOKEN=${CLOUDFLARED_TUNNEL_TOKEN}
      - CREDENTIALS_FILE=/etc/cloudflared/tunnelid.json
    volumes:
      - ${HOME}/.cloudflared/nindevdo:/etc/cloudflared:ro
    depends_on:
      - obs-socket-sentinel
