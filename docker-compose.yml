services:
  obs-socket-sentinel:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - CHAPTER_FILE=/markers/chapters.txt
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_CHANNEL_ID=${DISCORD_CHANNEL_ID}
      - HTTP_HOST=${HTTP_HOST:-0.0.0.0}
      - HTTP_PORT=${SOCKET_SENTINEL_PORT:-8088}
      - LISTEN_PORT=${LISTEN_PORT:-5678}
      - SS_TOKEN=${SS_TOKEN}
      - TEMPLATE_FILE=/app/overlay_template.html
      - WATCH_DIR=/markers
      - OBS_IP=${OBS_IP:-192.168.0.181}
      - OBS_PORT=${OBS_PORT:-4455}
      - OBS_PASSWORD=${OBS_PASSWORD}
      - OBS_CAMERA_SOURCE=${OBS_CAMERA_SOURCE:-videocamera}
      - OBS_COLOR_FILTER=${OBS_COLOR_FILTER:-gb-color}
      - OBS_MIC_SOURCE=${OBS_MIC_SOURCE:-Mic/Aux}
      - OBS_DESKTOP_SOURCE=${OBS_DESKTOP_SOURCE:-Desktop Audio}
      - VOICE_LISTENER_ENABLED=${VOICE_LISTENER_ENABLED:-false}
      - VOICE_AUDIO_PORT=${VOICE_AUDIO_PORT:-5555}
      - VOICE_WS_HOST=${VOICE_WS_HOST:-}
      - TWITCH_API_CLIENT_ID=${TWITCH_API_CLIENT_ID}
      - TWITCH_API_CLIENT_SECRET=${TWITCH_API_CLIENT_SECRET}
      - TWITCH_BROADCASTER_ID=${TWITCH_BROADCASTER_ID}
      - HF_HOME=/models/huggingface
      - XDG_CACHE_HOME=/models/cache
    volumes:
      - ./_data/markers:/markers:rw
      - ./_data/discord:/discord:rw
      - ./_data/sounds:/sounds:ro
      - ./_data/whisper-models:/models:rw
    ports:
      - ${SOCKET_SENTINEL_PORT:-8088}:8088
      - ${VOICE_AUDIO_PORT:-5555}:5555/udp

