  restreamer:
    image: datarhei/restreamer:cuda-latest
    container_name: restreamer
    restart: always
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['1']
              capabilities: [gpu]
    volumes:
      - ./_data/restreamer/config:/core/config
      - ./_data/restreamer/data:/core/data
    ports:
      - "${RESTREAMER_HTTP_PORT:-8080}:8080"
      - "${RESTREAMER_HTTPS_PORT:-8181}:8181"
      - "${RESTREAMER_RTMP_PORT:-1935}:1935"
      - "${RESTREAMER_RTMPS_PORT:-1936}:1936"
      - "${RESTREAMER_SRT_PORT:-6000}:6000/udp"
      - "${RESTREAMER_RIST_PORT:-9000}:9000/udp"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: obs-socket-sentinel-cloudflared
    restart: unless-stopped
    command: >
      tunnel --config /etc/cloudflared/config.yml --no-autoupdate run --token ${CLOUDFLARED_TUNNEL_TOKEN}
    network_mode: host
    environment:
      - CLOUDFLARED_HOSTNAME=${CLOUDFLARED_HOSTNAME:-ss.nindevdo.com}
      - CLOUDFLARED_SERVICE=http://localhost:${SOCKET_SENTINEL_PORT:-8088}
      - CLOUDFLARED_TUNNEL_ID=${CLOUDFLARED_TUNNEL_ID}
      - CLOUDFLARED_TUNNEL_ORIGIN_CERT=/etc/cloudflared/cert.pem
      - CLOUDFLARED_TUNNEL_TOKEN=${CLOUDFLARED_TUNNEL_TOKEN}
      - CREDENTIALS_FILE=/etc/cloudflared/tunnelid.json
    volumes:
      - ${HOME}/.cloudflared/nindevdo:/etc/cloudflared:ro
    depends_on:
      - obs-socket-sentinel
