<!DOCTYPE html>
<html>
<head>
  <title>Caption Test</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #1a1a1a;
      color: white;
      font-family: Arial, sans-serif;
    }
    
    .live-caption {
      position: fixed;
      bottom: 150px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.95);
      color: white;
      padding: 40px 80px;
      border-radius: 20px;
      font-size: 120px;
      font-weight: 900;
      text-align: center;
      max-width: 90%;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
      z-index: 15000;
      opacity: 0;
      transition: opacity 0.3s ease;
      line-height: 1.2;
      letter-spacing: 1px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
    }
    
    .live-caption.visible {
      opacity: 1;
    }
    
    #log {
      margin-top: 20px;
      padding: 10px;
      background: #2a2a2a;
      border-radius: 5px;
      max-height: 400px;
      overflow-y: auto;
      font-size: 14px;
      font-family: monospace;
    }
    
    .log-entry {
      margin: 5px 0;
      padding: 5px;
      border-left: 3px solid #4CAF50;
      padding-left: 10px;
    }
  </style>
</head>
<body>
  <h1>🎤 Live Caption Test</h1>
  <p>Polling overlay API every 500ms...</p>
  
  <div id="live-caption" class="live-caption"></div>
  
  <div id="log"></div>
  
  <script>
    const captionEl = document.getElementById('live-caption');
    const logEl = document.getElementById('log');
    
    function addLog(message) {
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      const time = new Date().toLocaleTimeString();
      entry.textContent = `[${time}] ${message}`;
      logEl.insertBefore(entry, logEl.firstChild);
      
      // Keep only last 50 entries
      while (logEl.children.length > 50) {
        logEl.removeChild(logEl.lastChild);
      }
    }
    
    async function checkCaption() {
      try {
        const response = await fetch('/overlay');
        const data = await response.json();
        const caption = data.caption || "";
        
        if (caption && caption.trim()) {
          captionEl.textContent = caption;
          captionEl.classList.add('visible');
          addLog(`📝 Caption: "${caption}"`);
        } else {
          captionEl.classList.remove('visible');
        }
      } catch (error) {
        addLog(`❌ Error: ${error.message}`);
      }
    }
    
    // Poll every 500ms
    setInterval(checkCaption, 500);
    checkCaption();
    
    addLog('✅ Caption test started');
  </script>
</body>
</html>
