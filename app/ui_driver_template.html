<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>OBS Socket Sentinel - Action UI</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Embedded data - replaced by server -->
    <script>window.EMBEDDED_OBS_ACTIONS = {};</script>
    <script>window.EMBEDDED_GAMES_CONFIG = {};</script>
    <script>window.EMBEDDED_CURRENT_GAME = "";</script>
    <script>window.EMBEDDED_ACTION_COUNTS = {};</script>
    <script>window.EMBEDDED_RUN_STATS = null;</script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Orbitron", "Noto Color Emoji", sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            color: #ffffff;
            height: 100vh;
            width: 100vw;
            margin: 0;
            padding: 0;
            overflow: hidden;
            letter-spacing: normal;
            word-spacing: normal;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr auto;
            gap: 0.5rem;
            padding: 0.5rem;
            box-sizing: border-box;
            overflow: hidden;
        }

        .header {
            text-align: center;
            padding: 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 0.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #00ffcc;
            margin: 0;
        }

        .subtitle {
            font-size: 0.75rem;
            color: #a0a0a0;
            margin: 0.25rem 0 0 0;
        }

        .current-game {
            font-size: 1rem;
            font-weight: 600;
            color: #ffd700;
            margin: 0.25rem 0 0 0;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            overflow-y: auto;
            overflow-x: hidden;
            min-height: 0;
        }

        .section-header {
            font-size: 1rem;
            font-weight: 700;
            color: #00ffcc;
            margin: 0.5rem 0 0.25rem 0;
            padding: 0.25rem 0.5rem;
            background: rgba(0, 255, 204, 0.1);
            border-left: 3px solid #00ffcc;
            border-radius: 0.25rem;
        }

        .actions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .action-btn {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(147, 51, 234, 0.1) 100%);
            border: 2px solid rgba(59, 130, 246, 0.3);
            border-radius: 0.5rem;
            padding: 0.75rem;
            color: #ffffff;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 0.25rem;
            user-select: none;
            min-height: 80px;
            height: 100%;
            letter-spacing: normal;
            word-spacing: normal;
            position: relative;
        }

        .game-emoji {
            font-size: 1.5rem;
            margin: 0;
        }

        .action-btn:hover {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2) 0%, rgba(147, 51, 234, 0.2) 100%);
            border-color: rgba(59, 130, 246, 0.6);
            transform: translateY(-2px);
        }

        .action-btn:active {
            transform: translateY(0);
        }

        .action-btn.triggered {
            animation: actionTrigger 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.2) 0%, rgba(16, 185, 129, 0.2) 100%);
            border-color: rgba(34, 197, 94, 0.6);
        }

        .status.connected {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.5);
            color: #4ade80;
        }

        .status.disconnected {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #ef4444;
        }

        .status.loading {
            background: rgba(251, 191, 36, 0.2);
            border: 1px solid rgba(251, 191, 36, 0.5);
            color: #fbbf24;
        }

        .action-btn.active {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.3) 0%, rgba(16, 185, 129, 0.3) 100%);
            border-color: rgba(34, 197, 94, 0.8);
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.4), inset 0 0 20px rgba(34, 197, 94, 0.2);
        }

        .action-btn.active::after {
            content: '✓';
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            font-size: 1rem;
            color: #4ade80;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(34, 197, 94, 0.8);
        }

        .action-btn.recording {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.3) 0%, rgba(220, 38, 38, 0.3) 100%);
            border-color: rgba(239, 68, 68, 0.8);
            animation: recordingPulse 2s ease-in-out infinite;
        }

        @keyframes recordingPulse {
            0%, 100% { 
                box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
            }
            50% { 
                box-shadow: 0 0 40px rgba(239, 68, 68, 0.8);
            }
        }

        @keyframes actionTrigger {
            0% { 
                transform: scale(1);
                box-shadow: 0 0 0 rgba(34, 197, 94, 0.5);
            }
            50% { 
                transform: scale(1.05);
                box-shadow: 0 0 30px rgba(34, 197, 94, 0.8);
            }
            100% { 
                transform: scale(1);
                box-shadow: 0 0 0 rgba(34, 197, 94, 0.5);
            }
        }

        .action-emoji {
            font-size: min(max(3vh, 3vw), 36px);
            margin-bottom: min(0.5vh, 5px);
            filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.3));
            line-height: 1;
        }

        .action-label {
            font-size: min(max(1.4vh, 1.4vw), 16px);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            line-height: 1.1;
        }

        .action-key {
            font-size: min(max(1.2vh, 1.2vw), 14px);
            color: #a0a0a0;
            font-weight: 400;
            margin-top: min(0.4vh, 4px);
            line-height: 1;
        }

        .system-actions {
            padding-bottom: 0.5rem;
            margin-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .system-actions h3 {
            color: #fbbf24;
            font-size: 0.875rem;
            margin: 0 0 0.5rem 0;
            text-align: center;
            text-transform: uppercase;
        }

        .system-actions .actions-grid {
            grid-template-columns: repeat(auto-fit, minmax(7rem, 1fr));
        }

        .system-actions .action-btn {
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.1) 0%, rgba(245, 158, 11, 0.1) 100%);
            border-color: rgba(251, 191, 36, 0.3);
        }
        
        .obs-actions {
            padding-bottom: 0.5rem;
            margin-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .obs-actions h3 {
            color: #10b981;
            font-size: 0.875rem;
            margin: 0 0 0.5rem 0;
            text-align: center;
            text-transform: uppercase;
        }

        .obs-actions .actions-grid {
            grid-template-columns: repeat(auto-fit, minmax(7rem, 1fr));
        }

        .obs-actions .action-btn {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, rgba(5, 150, 105, 0.1) 100%);
            border-color: rgba(16, 185, 129, 0.3);
        }
        
        .game-actions {
            /* Same as main actions-grid */
        }
            border-color: rgba(251, 191, 36, 0.3);
        }

        .system-actions .action-btn:hover {
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.2) 0%, rgba(245, 158, 11, 0.2) 100%);
            border-color: rgba(251, 191, 36, 0.6);
            box-shadow: 0 20px 40px rgba(251, 191, 36, 0.15);
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #a0a0a0;
            font-size: 1rem;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left: 4px solid #00ffcc;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            padding: 15px;
            margin: 15px 0;
            color: #ef4444;
            text-align: center;
        }

        .refresh-btn {
            background: rgba(59, 130, 246, 0.2);
            border: 2px solid rgba(59, 130, 246, 0.4);
            border-radius: 8px;
            color: #3b82f6;
            padding: 8px 16px;
            margin: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            background: rgba(59, 130, 246, 0.3);
            border-color: rgba(59, 130, 246, 0.6);
            transform: translateY(-2px);
        }

        /* Auth Modal Styles */
        .auth-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            backdrop-filter: blur(10px);
        }

        .auth-modal-content {
            background: linear-gradient(135deg, rgba(15, 15, 26, 0.95) 0%, rgba(26, 26, 46, 0.95) 100%);
            border: 2px solid rgba(0, 255, 204, 0.3);
            border-radius: min(1.6vh, 16px);
            padding: min(4vh, 40px);
            max-width: min(50vw, 400px);
            width: 90%;
            text-align: center;

        }

        .auth-header h2 {
            color: #00ffcc;
            margin-bottom: min(1vh, 10px);
            font-size: min(max(2.2vh, 2.2vw), 24px);
            line-height: 1.1;
        }

        .auth-header p {
            color: #a0a0a0;
            margin-bottom: min(3vh, 30px);
            font-size: min(max(1.6vh, 1.6vw), 18px);
            line-height: 1.2;
        }

        .auth-form {
            margin-bottom: min(2vh, 20px);
        }

        #tokenInput {
            width: 100%;
            padding: min(1.5vh, 15px);
            margin-bottom: min(2vh, 20px);
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: min(0.8vh, 8px);
            color: #ffffff;
            font-size: min(max(1.6vh, 1.6vw), 18px);
            font-family: inherit;
            box-sizing: border-box;
            line-height: 1.2;
        }

        #tokenInput:focus {
            outline: none;
            border-color: #00ffcc;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
        }

        #tokenInput::placeholder {
            color: #666;
        }

        .auth-btn {
            width: 100%;
            padding: min(1.5vh, 15px);
            background: linear-gradient(135deg, #00ffcc 0%, #00d4aa 100%);
            border: none;
            border-radius: min(0.8vh, 8px);
            color: #000;
            font-size: min(max(1.6vh, 1.6vw), 18px);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            line-height: 1.2;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 255, 204, 0.3);
        }

        .auth-btn:active {
            transform: translateY(0);
        }

        .auth-error {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: min(0.8vh, 8px);
            padding: min(1vh, 10px);
            margin-top: min(1.5vh, 15px);
            font-size: min(max(1.4vh, 1.4vw), 16px);
            line-height: 1.2;
        }

        /* Hide main content when not authenticated */
        body.auth-required .container {
            filter: blur(5px);
            pointer-events: none;
        }

        /* Initially hide main content */
        body {
            overflow: hidden;
        }
        
        body:not(.auth-required) {
            overflow: hidden;
        }

        /* Minimum scale constraints for very small screens */
        @media (max-height: 600px) {
            .container {
                padding: min(1vh, 10px);
            }
            
            .header {
                padding: min(1vh, 10px);
                margin-bottom: min(1vh, 10px);
            }
            
            .title {
                font-size: min(max(2.5vh, 2.5vw), 30px);
            }
            
            .subtitle {
                font-size: min(max(1.5vh, 1.5vw), 16px);
            }
            
            .system-actions {
                padding-top: min(1vh, 10px);
            }
        }

        @media (max-width: 800px) {
            .actions-grid {
                grid-template-columns: repeat(auto-fit, minmax(min(max(25vw, 150px), 220px), 1fr));
            }
            
            .system-actions .actions-grid {
                grid-template-columns: repeat(auto-fit, minmax(min(max(20vw, 100px), 150px), 1fr));
            }
        }

        @media (max-width: 500px) {
            .actions-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .system-actions .actions-grid {
                grid-template-columns: repeat(auto-fit, minmax(min(30vw, 120px), 1fr));
            }
        }

        .logout-btn {
            position: absolute;
            top: min(1vh, 10px);
            right: min(1vh, 10px);
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.4);
            border-radius: 6px;
            color: #ef4444;
            padding: min(0.8vh, 8px) min(1.2vh, 12px);
            font-size: min(max(1.2vh, 1.2vw), 14px);
            cursor: pointer;
            transition: all 0.2s;
            line-height: 1;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.3);
            border-color: rgba(239, 68, 68, 0.6);
        }

        /* Status and loading indicators */
        .status {
            padding: min(1vh, 10px) min(2vh, 20px);
            border-radius: min(0.8vh, 8px);
            margin: min(1vh, 10px) auto;
            max-width: min(50vw, 400px);
            text-align: center;
            font-weight: 500;
            font-size: min(max(1.4vh, 1.4vw), 16px);
            line-height: 1.1;
        }

        .status.connected {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.5);

        }

        .status.disconnected {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #ef4444;
        }

        .status.loading {
            background: rgba(251, 191, 36, 0.2);
            border: 1px solid rgba(251, 191, 36, 0.5);
            color: #fbbf24;
        }

        .loading {
            text-align: center;
            padding: min(4vh, 40px) min(2vh, 20px);
            color: #a0a0a0;
            font-size: min(2.5vw, 1rem);
        }

        .loading {
            text-align: center;
            padding: min(4vh, 40px) min(2vh, 20px);
            color: #a0a0a0;
            font-size: min(max(1.8vh, 1.8vw), 20px);
            line-height: 1.2;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left: 4px solid #00ffcc;
            border-radius: 50%;
            width: min(4vh, 40px);
            height: min(4vh, 40px);
            animation: spin 1s linear infinite;
            margin: 0 auto min(1.5vh, 15px);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {

            border: 1px solid rgba(239, 68, 68, 0.3);

            margin: min(1.5vh, 15px) 0;

            border: 2px solid rgba(59, 130, 246, 0.4);

<body>
    <div class="container">
        <div class="header">
            <h1 class="title">🎮 OBS Socket Sentinel</h1>
            <p class="subtitle">Action Controller UI</p>
            <div id="status" class="status loading">
                <div class="spinner"></div>
                Loading configuration...
            </div>
            <div id="currentGame" class="current-game" style="display: none;"></div>
            <button id="logoutBtn" class="logout-btn" style="display: none;">🚪 Logout</button>
        </div>

        <div class="main-content">
            <div id="content" class="actions-container">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Connecting to server...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Auth Modal -->
    <div id="authModal" class="auth-modal">
        <div class="auth-modal-content">
            <div class="auth-header">
                <h2>🔐 Authentication Required</h2>
                <p>Please enter your access token to use the Action UI</p>
            </div>
            <div class="auth-form">
                <input type="password" id="tokenInput" placeholder="Enter your SS_TOKEN" autocomplete="off">
                <button id="authSubmit" class="auth-btn">Access UI</button>
            </div>
            <div id="authError" class="auth-error" style="display: none;">
                ❌ Invalid token. Please try again.
            </div>
        </div>
    </div>

    <script>
        class ActionUI {
            constructor() {
                this.config = null;
                this.currentGame = null;
                this.hotkeyMappings = {};
                this.serverUrl = window.location.origin;
                this.statusEl = document.getElementById('status');
                this.contentEl = document.getElementById('content');
                this.currentGameEl = document.getElementById('currentGame');
                this.logoutBtn = document.getElementById('logoutBtn');
                this.reconnectDelay = 1000;
                this.maxReconnectDelay = 30000;
                this.authToken = null;
                this.isAuthenticated = false;
                this.authExpiry = null;
                this.AUTH_TIMEOUT = 30 * 60 * 1000; // 30 minutes
                
                this.initAuth();
                this.setupDelegatedEventListeners(); // New: setup delegated listeners
            }

            setupDelegatedEventListeners() {
                this.contentEl.addEventListener('click', (e) => {
                    let targetButton = e.target.closest('.action-btn');
                    if (targetButton) {
                        e.preventDefault();
                        const action = targetButton.dataset.action;
                        const game = targetButton.dataset.game;
                        this.triggerAction(action, game, targetButton);
                    }
                });
            }

            initAuth() {
                // Check if we have a stored token first
                const storedToken = this.getStoredToken();
                if (storedToken) {
                    console.log('Found stored token, attempting auto-login...');
                    this.attemptAutoLogin(storedToken);
                    return;
                }
                
                // Show auth modal on load
                document.body.classList.add('auth-required');
                
                const authModal = document.getElementById('authModal');
                const tokenInput = document.getElementById('tokenInput');
                const authSubmit = document.getElementById('authSubmit');
                const authError = document.getElementById('authError');
                
                const attemptAuth = async () => {
                    const token = tokenInput.value.trim();
                    if (!token) {
                        this.showAuthError('Please enter a token');
                        return;
                    }
                    
                    // Show loading state
                    authSubmit.disabled = true;
                    authSubmit.textContent = 'Validating...';
                    authError.style.display = 'none';
                    
                    try {
                        // Test token by trying to make a test action request
                        const testData = {
                            action: "test_auth",
                            game: "test"
                        };
                        
                        const response = await fetch(`${this.serverUrl}/action`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${token}`
                            },
                            body: JSON.stringify(testData)
                        });
                        
                        console.log('Auth response status:', response.status);
                        
                        if (response.status === 200 || response.status === 400) {
                            // Token is valid - either successful action or valid auth but invalid action
                            // Both indicate the token was accepted by the server
                            console.log('Token accepted by server');
                            this.authToken = token;
                            this.isAuthenticated = true;
                            this.authExpiry = Date.now() + this.AUTH_TIMEOUT;
                            
                            // Save token to localStorage for future sessions
                            this.storeToken(token);
                            
                            authModal.style.display = 'none';
                            document.body.classList.remove('auth-required');
                            authError.style.display = 'none';
                            
                            // Show logout button
                            this.logoutBtn.style.display = 'block';
                            this.logoutBtn.addEventListener('click', () => this.logout());
                            
                            // Set up session timeout
                            setTimeout(() => this.checkAuthExpiry(), this.AUTH_TIMEOUT);
                            
                            this.init();
                        } else if (response.status === 401) {
                            // Token is invalid
                            console.log('Token rejected by server (401)');
                            this.showAuthError('Invalid token. Please check your SS_TOKEN and try again.');
                        } else {
                            // Other error
                            console.log('Server error:', response.status);
                            this.showAuthError(`Server error (${response.status}). Please try again.`);
                        }
                    } catch (error) {
                        console.error('Auth request failed:', error);
                        this.showAuthError('Failed to connect to server. Please check your connection and try again.');
                    } finally {
                        // Reset button state
                        authSubmit.disabled = false;
                        authSubmit.textContent = 'Access UI';
                    }
                };
                
                authSubmit.addEventListener('click', attemptAuth);
                tokenInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        attemptAuth();
                    }
                });
                
                // Focus the input
                setTimeout(() => tokenInput.focus(), 100);
            }
            
            async attemptAutoLogin(token) {
                console.log('Attempting auto-login with stored token...');
                
                try {
                    // Test token by trying to make a test action request
                    const testData = {
                        action: "test_auth",
                        game: "test"
                    };
                    
                    const response = await fetch(`${this.serverUrl}/action`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify(testData)
                    });
                    
                    if (response.status === 200 || response.status === 400) {
                        // Token is still valid
                        console.log('Auto-login successful');
                        this.authToken = token;
                        this.isAuthenticated = true;
                        this.authExpiry = Date.now() + this.AUTH_TIMEOUT;
                        
                        // Hide auth modal
                        document.getElementById('authModal').style.display = 'none';
                        document.body.classList.remove('auth-required');
                        
                        // Show logout button
                        this.logoutBtn.style.display = 'block';
                        this.logoutBtn.addEventListener('click', () => this.logout());
                        
                        // Set up session timeout
                        setTimeout(() => this.checkAuthExpiry(), this.AUTH_TIMEOUT);
                        
                        this.init();
                    } else {
                        // Token is no longer valid
                        console.log('Stored token is invalid, clearing...');
                        this.clearStoredToken();
                        this.showAuthModal();
                    }
                } catch (error) {
                    console.error('Auto-login failed:', error);
                    // Show auth modal on failure
                    this.showAuthModal();
                }
            }
            
            showAuthModal() {
                document.body.classList.add('auth-required');
                document.getElementById('authModal').style.display = 'flex';
                setTimeout(() => document.getElementById('tokenInput').focus(), 100);
            }

            // Token storage methods with base64 encoding
            storeToken(token) {
                try {
                    // Simple base64 encoding with some obfuscation
                    const encoded = btoa(encodeURIComponent(token + ':obs-sentinel'));
                    localStorage.setItem('ss_auth_data', encoded);
                } catch (error) {
                    console.error('Failed to store token:', error);
                }
            }

            getStoredToken() {
                try {
                    const encoded = localStorage.getItem('ss_auth_data');
                    if (!encoded) return null;
                    
                    const decoded = decodeURIComponent(atob(encoded));
                    if (decoded.endsWith(':obs-sentinel')) {
                        return decoded.slice(0, -13); // Remove ':obs-sentinel'
                    }
                    return null;
                } catch (error) {
                    console.error('Failed to decode stored token:', error);
                    this.clearStoredToken();
                    return null;
                }
            }

            clearStoredToken() {
                localStorage.removeItem('ss_auth_data');
            }
            
            showAuthError(message) {
                const authError = document.getElementById('authError');
                authError.textContent = `❌ ${message}`;
                authError.style.display = 'block';
                console.log('Auth error:', message);
                
                // Clear error after 10 seconds
                setTimeout(() => {
                    authError.style.display = 'none';
                }, 10000);
            }

            checkAuthExpiry() {
                if (this.authExpiry && Date.now() > this.authExpiry) {
                    this.logout();
                }
            }

            logout() {
                this.authToken = null;
                this.isAuthenticated = false;
                this.authExpiry = null;
                
                // Clear stored token
                this.clearStoredToken();
                
                document.body.classList.add('auth-required');
                document.getElementById('authModal').style.display = 'flex';
                document.getElementById('tokenInput').value = '';
                document.getElementById('authError').style.display = 'none';
                this.logoutBtn.style.display = 'none';
            }

            async init() {
                // Strict authentication check
                if (!this.isAuthenticated || !this.authToken) {
                    console.log('Init blocked - not authenticated');
                    return;
                }
                
                console.log('Init proceeding - user is authenticated');
                
                try {
                    await this.loadConfig();
                    // currentGame is now loaded from server in loadConfig()
                    this.render();
                    this.setStatus('connected', '✅ Connected to server');
                    
                    // Poll for state changes every 2 seconds - UPDATE incrementally
                    setInterval(async () => {
                        await this.refreshState();
                    }, 2000);
                } catch (error) {
                    console.error('Failed to initialize:', error);
                    this.setStatus('disconnected', '❌ Failed to connect to server');
                    this.showError(error);
                    // Retry connection
                    setTimeout(() => this.init(), this.reconnectDelay);
                    this.reconnectDelay = Math.min(this.reconnectDelay * 2, this.maxReconnectDelay);
                }
            }

            async loadConfig() {
                try {
                    // All data is embedded in the page, no need to fetch
                    this.config = { games: window.EMBEDDED_GAMES_CONFIG || {} };
                    this.currentGame = window.EMBEDDED_CURRENT_GAME || '';
                    this.actionCounts = window.EMBEDDED_ACTION_COUNTS || {};
                    this.runStats = window.EMBEDDED_RUN_STATS || null;
                    this.obsActions = window.EMBEDDED_OBS_ACTIONS || {};
                    
                    console.log('Loaded config:', this.config);
                    console.log('Current game:', this.currentGame);
                    console.log('OBS actions:', this.obsActions);
                    
                    return true;
                } catch (error) {
                    console.error('Failed to load config:', error);
                    throw error;
                }
            }

            async loadHotkeyMappings() {
                try {
                    console.log('🔍 Checking for real hotkey mappings from OBS...');
                    const response = await fetch(`${this.serverUrl}/hotkeys`);
                    
                    if (response.ok) {
                        const data = await response.json();
                        this.hotkeyMappings = data.mappings || {};
                        
                        if (Object.keys(this.hotkeyMappings).length > 0) {
                            console.log('✅ Loaded real OBS hotkey mappings:', this.hotkeyMappings);
                        } else {
                            console.log('📭 No hotkey mappings available from OBS yet');
                        }
                        return true;
                    } else {
                        console.log('⚠️ Hotkey endpoint not available (server needs restart)');
                        this.hotkeyMappings = {};
                        return false;
                    }
                } catch (error) {
                    console.log('⚠️ Cannot connect to hotkey endpoint:', error.message);
                    this.hotkeyMappings = {};
                    return false;
                }
            }

            async loadOBSActions() {
                try {
                    const response = await fetch(`${this.serverUrl}/obs_state`, {
                        headers: {
                            'Authorization': `Bearer ${this.authToken}`
                        }
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        this.obsActions = data.obs_actions || {};
                        console.log('🔄 Refreshed OBS state:', this.obsActions);
                        return true;
                    }
                } catch (error) {
                    console.log('⚠️ Cannot refresh OBS state:', error.message);
                }
                return false;
            }

            // Fetch fresh state from server without full page reload
            async refreshState() {
                try {
                    const response = await fetch(`${this.serverUrl}/obs_state`, {
                        headers: {
                            'Authorization': `Bearer ${this.authToken}`
                        }
                    });
                    
                    if (!response.ok) return;
                    
                    const data = await response.json();
                    
                    // Update OBS actions
                    const newObsActions = data.obs_actions || {};
                    
                    // Only update UI if something changed
                    if (JSON.stringify(this.obsActions) !== JSON.stringify(newObsActions)) {
                        this.obsActions = newObsActions;
                        this.updateOBSButtons();
                    }
                    
                    // Update current game if changed
                    if (data.current_game && data.current_game !== this.currentGame) {
                        this.currentGame = data.current_game;
                        this.updateCurrentGameDisplay();
                        // Game changed - need full re-render for game actions
                        this.render();
                    }
                } catch (error) {
                    // Silently fail - don't spam console
                }
            }
            
            // Update only OBS button states without re-rendering everything
            updateOBSButtons() {
                if (!this.obsActions) return;
                
                // Handle grouped structure (scenes, transitions, controls)
                for (const groupName of ['scenes', 'transitions', 'controls']) {
                    const group = this.obsActions[groupName];
                    if (!group) continue;
                    
                    for (const [action, data] of Object.entries(group)) {
                        const button = this.contentEl.querySelector(`button[data-action="${action}"]`);
                        if (!button) continue;
                        
                        const isActive = data.active || false;
                        const isRecording = data.recording || false;
                        const isStreaming = data.streaming || false;
                        
                        // Update button label if it's a toggle button
                        if (action === 'obs_toggle_stream') {
                            const label = button.querySelector('.action-label');
                            if (label) {
                                label.textContent = isStreaming ? '⏹️ Stop Stream' : '🔴 Start Stream';
                            }
                        } else if (action === 'obs_toggle_record') {
                            const label = button.querySelector('.action-label');
                            if (label) {
                                label.textContent = isRecording ? '⏹️ Stop Record' : '🔴 Start Record';
                            }
                        }
                        
                        // Update classes
                        button.classList.toggle('active', isActive);
                        button.classList.toggle('recording', isRecording || isStreaming);
                    }
                }
            }

            parseYAML(yamlText) {
                // Simple YAML parser for our specific needs
                const lines = yamlText.split('\n');
                const config = { games: {} };
                let currentGame = null;
                let currentSection = null;
                
                for (const line of lines) {
                    const trimmed = line.trim();
                    if (!trimmed || trimmed.startsWith('#')) continue;
                    
                    const indent = line.length - line.trimStart().length;
                    
                    if (indent === 2 && trimmed.endsWith(':')) {
                        // Game name
                        currentGame = trimmed.slice(0, -1);
                        config.games[currentGame] = { actions: {} };
                        currentSection = null;
                    } else if (indent === 4 && trimmed.endsWith(':')) {
                        // Section within game (emoji, actions)
                        currentSection = trimmed.slice(0, -1);
                        if (currentSection === 'emoji') {
                            config.games[currentGame].emoji = [];
                        }
                    } else if (indent === 6 && currentGame && currentSection === 'actions' && trimmed.includes(':')) {
                        // Action within game
                        const [action, emoji] = trimmed.split(':').map(s => s.trim());
                        if (emoji) {
                            config.games[currentGame].actions[action] = emoji.replace(/['"]/g, '');
                        }
                    } else if (indent === 6 && currentGame && currentSection === 'emoji' && trimmed.startsWith('- ')) {
                        // Emoji list
                        const emoji = trimmed.slice(2).replace(/['"]/g, '').trim();
                        if (emoji) {
                            config.games[currentGame].emoji.push(emoji);
                        }
                    } else if (indent === 4 && currentGame && trimmed.startsWith('emoji:')) {
                        // Single emoji on same line
                        const emojiPart = trimmed.split(':', 2)[1];
                        if (emojiPart) {
                            const emojis = emojiPart.trim().replace(/[\[\]"']/g, '').split(',');
                            config.games[currentGame].emoji = emojis.map(e => e.trim()).filter(Boolean);
                        }
                    }
                }
                
                return config;
            }

            async detectCurrentGame() {
                // For now, default to the first game in config
                // In a future version, this could detect the current OBS scene or use other logic
                const gameKeys = Object.keys(this.config.games);
                if (gameKeys.length > 0) {
                    const newGame = gameKeys[0]; // Default to first game
                    
                    if (this.currentGame !== newGame) {
                        this.currentGame = newGame;
                        this.updateCurrentGameDisplay();
                        this.render(); // Re-render with new game
                    }
                }
            }

            updateCurrentGameDisplay() {
                if (!this.currentGame || !this.config.games[this.currentGame]) {
                    this.currentGameEl.style.display = 'none';
                    return;
                }

                const gameConfig = this.config.games[this.currentGame];
                const emojis = gameConfig.emoji || [];
                const emojiString = emojis.length > 0 ? emojis.join(' ') : '';
                
                this.currentGameEl.innerHTML = `
                    <span class="game-emoji">${emojiString}</span>
                    <span>Current Game: ${this.formatGameName(this.currentGame)}</span>
                `;
                this.currentGameEl.style.display = 'block';
            }

            formatGameName(gameName) {
                return gameName
                    .replace(/_/g, ' ')
                    .split(' ')
                    .map(word => word.charAt(0).toUpperCase() + word.slice(1))
                    .join(' ');
            }

            render() {
                if (!this.config) {
                    this.contentEl.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading game data...</p></div>';
                    return;
                }

                // Update the game title display
                this.updateCurrentGameDisplay();

                // Get game actions if available
                const gameConfig = this.currentGame ? this.config.games[this.currentGame] : null;
                const actions = (gameConfig && gameConfig.actions) ? gameConfig.actions : {};
                const systemActions = ['intro', 'undo', 'clear', 'start'];
                const gameActions = Object.keys(actions).filter(action => !systemActions.includes(action));

                let html = '';

                // System actions FIRST (at top)
                html += '<div class="system-actions">';
                html += '<div class="section-header">🛠️ System Actions</div>';
                html += '<div class="actions-grid">';
                systemActions.forEach(action => {
                    const emoji = this.getSystemActionEmoji(action);
                    const hotkey = this.getHotkeyForAction(action);
                    html += this.createActionButton(action, emoji, hotkey, true);
                });
                html += '</div>';
                html += '</div>';

                // OBS Remote Controls (if available)
                if (this.obsActions && Object.keys(this.obsActions).length > 0) {
                    html += '<div class="obs-actions">';
                    html += '<div class="section-header">🎬 OBS Remote Control</div>';
                    
                    // Render scenes
                    if (this.obsActions.scenes && Object.keys(this.obsActions.scenes).length > 0) {
                        html += '<div style="font-size: 0.875rem; font-weight: 600; color: #a0aec0; margin: 0.75rem 0 0.25rem 0.25rem;">Scenes</div>';
                        html += '<div class="actions-grid">';
                        for (const [action, data] of Object.entries(this.obsActions.scenes)) {
                            const emoji = data.label.match(/^([\u{1F300}-\u{1F9FF}])/u)?.[0] || '🎬';
                            const label = data.label.replace(/^[\u{1F300}-\u{1F9FF}]\s*/u, '');
                            html += this.createActionButton(action, emoji, '', false, label, data.active, false);
                        }
                        html += '</div>';
                    }
                    
                    // Render transitions
                    if (this.obsActions.transitions && Object.keys(this.obsActions.transitions).length > 0) {
                        html += '<div style="font-size: 0.875rem; font-weight: 600; color: #a0aec0; margin: 0.75rem 0 0.25rem 0.25rem;">Transitions</div>';
                        html += '<div class="actions-grid">';
                        for (const [action, data] of Object.entries(this.obsActions.transitions)) {
                            const emoji = data.label.match(/^([\u{1F300}-\u{1F9FF}])/u)?.[0] || '✨';
                            const label = data.label.replace(/^[\u{1F300}-\u{1F9FF}]\s*/u, '');
                            html += this.createActionButton(action, emoji, '', false, label, data.active, false);
                        }
                        html += '</div>';
                    }
                    
                    // Render controls
                    if (this.obsActions.controls && Object.keys(this.obsActions.controls).length > 0) {
                        html += '<div style="font-size: 0.875rem; font-weight: 600; color: #a0aec0; margin: 0.75rem 0 0.25rem 0.25rem;">Recording & Streaming</div>';
                        html += '<div class="actions-grid">';
                        for (const [action, data] of Object.entries(this.obsActions.controls)) {
                            const emoji = data.label.match(/^([\u{1F300}-\u{1F9FF}])/u)?.[0] || '🎮';
                            const label = data.label.replace(/^[\u{1F300}-\u{1F9FF}]\s*/u, '');
                            const isRecording = data.recording || false;
                            html += this.createActionButton(action, emoji, '', false, label, data.active, isRecording);
                        }
                        html += '</div>';
                    }
                    
                    html += '</div>';
                }

                // Game-specific actions BELOW
                if (gameActions.length > 0) {
                    html += '<div class="section-header">🎮 Game Actions</div>';
                    html += '<div class="actions-grid game-actions">';
                    gameActions.forEach(action => {
                        const emoji = actions[action];
                        const hotkey = this.getHotkeyForAction(action);
                        html += this.createActionButton(action, emoji, hotkey, false);
                    });
                    html += '</div>';
                } else if (!this.currentGame) {
                    html += '<div class="info" style="text-align: center; padding: 1rem; color: #a0aec0; background: rgba(45, 55, 72, 0.5); border-radius: 0.5rem; margin: 0.5rem 0;">ℹ️ Select a game to see game-specific actions</div>';
                }

                // Add run stats if available
                if (this.runStats) {
                    const kd = this.runStats.deaths > 0 ? (this.runStats.kills / this.runStats.deaths).toFixed(2) : this.runStats.kills;
                    html += `
                        <div class="run-stats" style="background: rgba(45, 55, 72, 0.8); border-radius: 12px; padding: 20px; margin: 20px auto; max-width: 400px; border: 1px solid #4a5568;">
                            <h3 style="margin: 0 0 15px 0; color: #4fd1c7; text-align: center;">Current Run #${this.runStats.run_number}</h3>
                            <div style="padding: 8px 0; font-size: 1.1em; border-bottom: 1px solid #2d3748;">💀 Kills: ${this.runStats.kills}</div>
                            <div style="padding: 8px 0; font-size: 1.1em; border-bottom: 1px solid #2d3748;">☠️ Deaths: ${this.runStats.deaths}</div>
                            <div style="padding: 8px 0; font-size: 1.1em; border-bottom: 1px solid #2d3748;">🤯 Headshots: ${this.runStats.headshots}</div>
                            <div style="padding: 8px 0; font-size: 1.1em;">📊 K/D: ${kd}</div>
                        </div>
                    `;
                }

                this.contentEl.innerHTML = html;
            }

            createActionButton(action, emoji, hotkey, isSystem = false, customLabel = null, isActive = false, isRecording = false) {
                const label = customLabel || this.formatActionName(action);
                // For game actions, look up count using game::action key, for system actions just use action
                const countKey = isSystem ? action : `${this.currentGame}::${action}`;
                const count = this.actionCounts[countKey] || 0;
                const countDisplay = count > 0 ? ` (${count})` : '';
                // Only show hotkey info if we have a real mapping
                const hotkeyText = hotkey ? hotkey : '';
                
                let classes = 'action-btn';
                if (isActive) classes += ' active';
                if (isRecording) classes += ' recording';
                
                return `
                    <button class="${classes}" data-action="${action}" data-game="${this.currentGame}">
                        <div class="action-emoji">${emoji}</div>
                        <div class="action-label">${label}${countDisplay}</div>
                        ${hotkeyText ? `<div class="action-key">${hotkeyText}</div>` : ''}
                    </button>
                `;
            }

            formatActionName(action) {
                return action
                    .replace(/_/g, ' ')
                    .split(' ')
                    .map(word => word.charAt(0).toUpperCase() + word.slice(1))
                    .join(' ');
            }

            getSystemActionEmoji(action) {
                const systemEmojis = {
                    'intro': '🎬',
                    'undo': '↩️',
                    'clear': '🧹',
                    'start': '🎬'
                };
                return systemEmojis[action] || '⚡';
            }

            getHotkeyForAction(action) {
                // Only show real hotkey mappings from OBS, no fallbacks
                if (this.hotkeyMappings && this.hotkeyMappings[action]) {
                    return this.hotkeyMappings[action];
                }
                
                // No mapping available - don't show fake defaults
                return '';
            }



            async triggerAction(action, game, buttonEl) {
                // Prevent double-clicks
                if (buttonEl.disabled) return;
                buttonEl.disabled = true;

                try {
                    // Add triggered animation (single time)
                    buttonEl.classList.add('triggered');

                    const response = await fetch(`${this.serverUrl}/action`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${this.authToken}`
                        },
                        body: JSON.stringify({
                            action: action,
                            game: game
                        })
                    });

                    if (response.status === 401) {
                        this.logout();
                        return;
                    }

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }

                    const result = await response.json();
                    console.log('Action triggered successfully:', result);

                    // If all_counts is provided (from clear/undo), update all counts
                    if (result.all_counts) {
                        this.actionCounts = result.all_counts;
                        this.render();
                    } else if (result.new_count !== undefined) {
                        // Update single action count if provided
                        const countKey = result.game ? `${result.game}::${action}` : action;
                        this.actionCounts[countKey] = result.new_count;
                        this.render();
                    }

                    // Refresh OBS state immediately after action for better responsiveness
                    if (action.startsWith('scene_') || action.startsWith('transition_') || action.startsWith('obs_')) {
                        await this.loadOBSActions();
                        this.render();
                    }

                    // Brief success feedback
                    this.setStatus('connected', `✅ ${this.formatActionName(action)} triggered`);
                    setTimeout(() => {
                        this.setStatus('connected', '✅ Connected to server');
                    }, 2000);

                } catch (error) {
                    console.error('Failed to trigger action:', error);
                    this.setStatus('disconnected', `❌ Failed to trigger ${action}`);
                    setTimeout(() => {
                        this.setStatus('connected', '✅ Connected to server');
                    }, 3000);
                } finally {
                    // Clean up animation and re-enable button
                    setTimeout(() => {
                        buttonEl.classList.remove('triggered');
                        buttonEl.disabled = false;
                    }, 600);
                }
            }

            setStatus(type, message) {
                this.statusEl.className = `status ${type}`;
                this.statusEl.innerHTML = message;
            }

            showError(error) {
                const errorHtml = `
                    <div class="error">
                        <h3>⚠️ Connection Error</h3>
                        <p>${error.message}</p>
                        <button class="refresh-btn" onclick="location.reload()">Refresh Page</button>
                    </div>
                `;
                this.contentEl.innerHTML = errorHtml;
            }
        }

        // Initialize the UI when the page loads
        let actionUI;
        document.addEventListener('DOMContentLoaded', () => {
            actionUI = new ActionUI();
            window.actionUI = actionUI; // Make it accessible in console for debugging
        });

        // Add keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'r') {
                e.preventDefault();
                location.reload();
            }
        });
    </script>
