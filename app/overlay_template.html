<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Socket Sentinel Overlay</title>
  
  <!-- Three.js for 3D intro animation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <style>
    @font-face {
      font-family: "ProggyClean Nerd Font";
      src: url('/fonts/ProggyCleanNerdFont-Regular.ttf') format('truetype');
      font-style: normal;
      font-weight: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "ProggyClean Nerd Font";
      src: url('/fonts/ProggyCleanNerdFontMono-Regular.ttf') format('truetype');
      font-style: normal;
      font-weight: normal;
      font-display: swap;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: rgba(0,0,0,0);
      overflow: hidden;
      font-family: "ProggyClean Nerd Font", "Noto Color Emoji", sans-serif;
    }

    #overlay-root {
      position: fixed;
      bottom: 4vh;
      right: 3vw;
      pointer-events: none;
    }

    /* ============================= */
    /* COUNTER BOX                   */
    /* ============================= */

    .counter-box {
      display: inline-flex;
      flex-direction: row;
      align-items: center;

      padding: 0.7rem 1.1rem;
      border-radius: 1rem;

      background: rgba(20, 20, 28, 0.9);
      border: 0.08rem solid rgba(255,255,255,0.1);
      box-shadow:
        0 0.8rem 2.4rem rgba(0,0,0,0.55),
        0 0 0.8rem rgba(0,255,220,0.15);

      font-size: clamp(1.3rem, 2.3vw, 2.4rem);
      line-height: 1.0;
      gap: 0.4em;
      color: #fff;

      transform: translateX(180%);
      opacity: 0;
      transition:
        transform 0.35s cubic-bezier(0.22, 1, 0.36, 1),
        opacity 0.25s ease-out;
    }

    .counter-box.visible {
      transform: translateX(0%);
      opacity: 1;
    }

    .counter-text {
      font-family: "ProggyClean Nerd Font", "Noto Color Emoji", sans-serif;
      white-space: nowrap;
      letter-spacing: 0.04em;
      padding-top: 0.15em;
    }

    .counter-box.flash {
      animation: flashGlow 0.45s ease-out;
    }

    @keyframes flashGlow {
      0% {
        box-shadow:
          0 0.8rem 2.4rem rgba(0,0,0,0.55),
          0 0 0.8rem rgba(0,255,220,0.15);
      }
      40% {
        box-shadow:
          0 1.4rem 3.2rem rgba(0,0,0,0.7),
          0 0 1.4rem rgba(255,255,255,0.65);
      }
      100% {
        box-shadow:
          0 0.8rem 2.4rem rgba(0,0,0,0.55),
          0 0 0.8rem rgba(0,255,220,0.15);
      }
    }

    /* ============================= */
    /* THEMES                        */
    /* ============================= */

    .counter-box.theme-kill,
    .counter-box.theme-headshot {
      background: radial-gradient(circle at top left,
        rgba(255, 80, 80, 0.25),
        rgba(20,20,28,0.95));
    }

    .counter-box.theme-death,
    .counter-box.theme-downed {
      background: radial-gradient(circle at top left,
        rgba(180, 0, 0, 0.3),
        rgba(10,10,16,0.95));
    }

    .counter-box.theme-revive {
      background: radial-gradient(circle at top left,
        rgba(60, 200, 120, 0.35),
        rgba(12,18,16,0.95));
    }

    .counter-box.theme-funny {
      background: radial-gradient(circle at top left,
        rgba(255, 200, 80, 0.4),
        rgba(30, 22, 10, 0.95));
    }

    .counter-box.theme-banish {
      background: radial-gradient(circle at top left,
        rgba(190, 60, 255, 0.45),
        rgba(18, 10, 26, 0.96));
    }

    .counter-box.theme-extraction {
      background: radial-gradient(circle at top left,
        rgba(90, 190, 255, 0.4),
        rgba(8, 18, 26, 0.96));
    }

    /* ============================= */
    /* MEME (image / gif / video)    */
    /* ============================= */

    .meme-layer {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(0.3) rotate(0deg);
      transform-origin: center center;
      opacity: 0;
      pointer-events: none;
      z-index: 9999;
    }

    #meme-wrapper {
      z-index: 9999;
    }

    #meme-img,
    #meme-video,
    #meme-yt {
      width: 80vw;
      max-height: 80vh;
      border-radius: 1rem;
      object-fit: contain;
      box-shadow: none;
      background: transparent;
      border: none;
      display: none;
    }

    /* ============================= */
    /* EMOJI MARQUEE (top & bottom)  */
    /* ============================= */

    .marquee {
      position: fixed;
      left: 0;
      width: 100vw;
      font-size: 3rem;
      white-space: nowrap;
      pointer-events: none;
      z-index: 11000; /* in front of meme */
      opacity: 0;
      text-align: center;
      padding: 100px;
    }

    #marquee-top {
      top: 0;
    }

    #marquee-bottom {
      bottom: 0;
    }

    .marquee-inner {
      display: inline-block;
    }

    .marquee.active {
      opacity: 1;
    }

    @keyframes marqueeTopFlow {
      0% {
        transform: translateX(-110vw);
        opacity: 0;
      }
      20% {
        transform: translateX(-10vw);
        opacity: 1;
      }
      70% {
        transform: translateX(10vw);
        opacity: 1;
      }
      100% {
        transform: translateX(110vw);
        opacity: 0;
      }
    }

    @keyframes marqueeBottomFlow {
      0% {
        transform: translateX(110vw);
        opacity: 0;
      }
      20% {
        transform: translateX(10vw);
        opacity: 1;
      }
      70% {
        transform: translateX(-10vw);
        opacity: 1;
      }
      100% {
        transform: translateX(-110vw);
        opacity: 0;
      }
    }

    .marquee.active .marquee-inner-top {
      animation: marqueeTopFlow var(--marquee-duration, 4s)
        cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .marquee.active .marquee-inner-bottom {
      animation: marqueeBottomFlow var(--marquee-duration, 4s)
        cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    /* ============================= */
    /* BURST WORDS (event text)      */
    /* ============================= */

    .burst-word {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(0.1);
      transform-origin: center center;
      pointer-events: none;
      z-index: 10900; /* above meme, below marquee */
      font-family: "ProggyClean Nerd Font", sans-serif;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #fff;
      text-shadow:
        0 0 12px rgba(0,0,0,0.8),
        0 0 22px rgba(0,0,0,1),
        0 0 36px rgba(0,0,0,1);
      opacity: 0;
      animation: burstZoomFade 0.7s ease-out forwards;
      mix-blend-mode: screen;
    }

    @keyframes burstZoomFade {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.1);
      }
      10% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(0.9);
      }
      50% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.7);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(3.0);
      }
    }

    /* ============================= */
    /* RUNS RECAP PANEL              */
    /* ============================= */

    #runs-panel {
      position: fixed;
      top: 12.5vh;
      right: 2vw;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 1.2rem;
      pointer-events: none;
      z-index: 12000;
      max-height: 75vh;
      overflow: visible;
      transform-origin: top right;
      transform: scaleY(0);
      opacity: 0;
      transition:
        transform 0.35s cubic-bezier(0.22, 1, 0.36, 1),
        opacity 0.25s ease-out;
    }

    #runs-panel.visible {
      transform: scaleY(1);
      opacity: 1;
    }

    .run-row {
      font-family: "ProggyClean Nerd Font", "Noto Color Emoji", sans-serif;
      font-size: 3.0rem;
      padding: 0.4rem 1.4rem;
      border-radius: 0.8rem;
      background: rgba(10, 10, 16, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #f5f5f5;
      white-space: nowrap;
      transform-origin: right center;
      display: inline-flex;
      align-items: baseline;
      gap: 0.45em;
    }

    .run-row span.run-label {
      font-weight: 600;
      margin-right: 0.3em;
    }

    .run-row span.run-kd {
      opacity: 0.8;
      margin-left: 0.4em;
    }

    @keyframes activeRunGlow {
      0% {
        box-shadow:
          0 0 12px rgba(0, 255, 200, 0.3),
          0 0 26px rgba(0, 180, 255, 0.15);
        border-color: rgba(0, 255, 200, 0.6);
      }
      50% {
        box-shadow:
          0 0 20px rgba(220, 120, 255, 0.45),
          0 0 40px rgba(255, 180, 100, 0.25);
        border-color: rgba(255, 200, 140, 0.9);
      }
      100% {
        box-shadow:
          0 0 12px rgba(0, 255, 200, 0.3),
          0 0 26px rgba(0, 180, 255, 0.15);
        border-color: rgba(0, 255, 200, 0.6);
      }
    }

    .run-row.active-run {
      animation: activeRunGlow 1.8s ease-in-out infinite;
    }

    .run-row.highlight {
      animation: runRowHighlight 1.1s ease-out forwards;
      box-shadow:
        0 0 24px rgba(255, 255, 255, 0.65),
        0 0 46px rgba(0, 255, 200, 0.4);
    }

    @keyframes runRowHighlight {
      0% {
        transform: scale(1.0);
        box-shadow:
          0 0 8px rgba(255, 255, 255, 0.1),
          0 0 18px rgba(0, 0, 0, 0.8);
      }
      35% {
        transform: scale(1.07);
        box-shadow:
          0 0 26px rgba(255, 255, 255, 0.8),
          0 0 46px rgba(0, 255, 200, 0.55);
      }
      70% {
        transform: scale(1.03);
        box-shadow:
          0 0 18px rgba(255, 255, 255, 0.4),
          0 0 32px rgba(0, 255, 200, 0.3);
      }
      100% {
        transform: scale(1.0);
        box-shadow:
          0 0 10px rgba(255, 255, 255, 0.15),
          0 0 20px rgba(0, 0, 0, 0.8);
      }
    }

    /* ============================= */
    /* ACHIEVEMENT NOTIFICATION      */
    /* ============================= */

    #achievement-notification {
      position: fixed;
      top: 2vh;
      left: 50%;
      transform: translateX(-50%) translateY(-100%);
      opacity: 0;
      pointer-events: none;
      z-index: 15000;
      
      max-width: 95vw;
      min-width: 800px;
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.95), rgba(255, 165, 0, 0.95));
      border: 4px solid rgba(255, 255, 255, 0.9);
      border-radius: 16px;
      box-shadow: 
        0 12px 48px rgba(0, 0, 0, 0.7),
        0 0 30px rgba(255, 215, 0, 0.5),
        inset 0 3px 12px rgba(255, 255, 255, 0.4);
      
      font-family: "ProggyClean Nerd Font", "Noto Color Emoji", sans-serif;
      color: #1a1a1a;
      
      transition: 
        transform 0.6s cubic-bezier(0.22, 1, 0.36, 1),
        opacity 0.4s ease-out;
    }

    #achievement-notification.visible {
      transform: translateX(-50%) translateY(0%);
      opacity: 1;
    }

    .achievement-header {
      background: rgba(0, 0, 0, 0.15);
      padding: 12px 24px;
      border-radius: 16px 16px 0 0;
      border-bottom: 3px solid rgba(255, 255, 255, 0.4);
      font-size: 1.2rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
    }

    .achievement-content {
      display: flex;
      padding: 24px;
      gap: 24px;
      align-items: center;
    }

    .achievement-icon {
      width: 96px;
      height: 96px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.2);
      border: 3px solid rgba(255, 255, 255, 0.5);
      object-fit: contain;
      flex-shrink: 0;
    }

    .achievement-details {
      flex: 1;
      min-width: 0;
    }

    .achievement-title {
      font-size: 2.2rem;
      font-weight: 800;
      margin: 0 0 8px 0;
      line-height: 1.2;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.4);
    }

    .achievement-description {
      font-size: 1.4rem;
      margin: 0 0 12px 0;
      opacity: 0.9;
      line-height: 1.4;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
    }

    .achievement-game {
      font-size: 1.1rem;
      font-weight: 700;
      opacity: 0.8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
    }

    @keyframes achievementGlow {
      0%, 100% {
        box-shadow: 
          0 8px 32px rgba(0, 0, 0, 0.6),
          0 0 20px rgba(255, 215, 0, 0.4),
          inset 0 2px 8px rgba(255, 255, 255, 0.3);
      }
      50% {
        box-shadow: 
          0 12px 48px rgba(0, 0, 0, 0.8),
          0 0 40px rgba(255, 215, 0, 0.8),
          inset 0 2px 8px rgba(255, 255, 255, 0.5);
      }
    }

    #achievement-notification.visible {
      animation: achievementGlow 2.5s ease-in-out infinite;
    }

    /* Playtime notification styles (top-right corner) */
    #playtime-notification {
      position: fixed;
      top: 2vh;
      right: 2vw;
      transform: translateX(100%);
      opacity: 0;
      pointer-events: none;
      z-index: 14000;
      
      max-width: 500px;
      min-width: 400px;
      background: rgba(20, 20, 30, 0.85);
      border: 3px solid rgba(100, 100, 120, 0.7);
      border-radius: 16px;
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.6),
        0 0 20px rgba(100, 100, 120, 0.3),
        inset 0 2px 8px rgba(255, 255, 255, 0.1);
      
      font-family: "ProggyClean Nerd Font", "Noto Color Emoji", sans-serif;
      color: #ffffff;
      
      transition: 
        transform 0.6s cubic-bezier(0.22, 1, 0.36, 1),
        opacity 0.4s ease-out;
    }

    #playtime-notification.visible {
      transform: translateX(0%);
      opacity: 1;
    }

    .playtime-header {
      background: rgba(10, 10, 15, 0.8);
      padding: 15px 24px;
      border-radius: 16px 16px 0 0;
      border-bottom: 2px solid rgba(120, 120, 140, 0.5);
      font-size: 1.2rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
      color: #e0e0e0;
    }

    .playtime-content {
      padding: 20px;
    }

    .playtime-game {
      font-size: 1.8rem;
      font-weight: 700;
      margin: 0 0 12px 0;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
      color: #ffffff;
    }

    .playtime-time {
      font-size: 2.4rem;
      font-weight: 800;
      margin: 0 0 8px 0;
      color: #90cdf4;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.8);
    }

    .playtime-hours {
      font-size: 1.5rem;
      opacity: 0.9;
      font-weight: 500;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
      color: #d1d5db;
    }

    /* Achievement Percentages notification styles (right side, below playtime) */
    #achievement-percentages-notification {
      position: fixed;
      top: 22vh; /* Position further down from playtime */
      right: 2vw;
      transform: translateX(100%);
      opacity: 0;
      pointer-events: none;
      z-index: 13900;
      
      max-width: 450px;
      width: 450px;
      background: rgba(26, 26, 46, 0.95);
      border: 3px solid #FFD700;
      border-radius: 16px;
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.8),
        0 0 20px rgba(255, 215, 0, 0.5),
        inset 0 2px 8px rgba(255, 255, 255, 0.1);
      
      font-family: "ProggyClean Nerd Font", "Noto Color Emoji", sans-serif;
      color: #FFD700;
      
      transition: 
        transform 0.6s cubic-bezier(0.22, 1, 0.36, 1),
        opacity 0.4s ease-out;
      
      /* Ensure it doesn't extend past viewport */
      max-height: 70vh;
      overflow-y: auto;
      overflow-x: hidden;
    }

    #achievement-percentages-notification.visible {
      transform: translateX(0%);
      opacity: 1;
    }

    .achievement-percentages-header {
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 165, 0, 0.2));
      padding: 15px 24px;
      border-radius: 16px 16px 0 0;
      border-bottom: 3px solid #FFD700;
      font-size: 1.2rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
      color: #FFD700;
      font-family: "ProggyClean Nerd Font", "Noto Color Emoji", sans-serif;
    }

    .achievement-percentages-content {
      background: rgba(40, 40, 60, 0.8);
      padding: 24px;
      border-radius: 0 0 16px 16px;
    }

    .achievement-percentages-item {
      display: flex;
      align-items: flex-start;
      margin-bottom: 18px;
      padding: 15px;
      background: rgba(50, 50, 70, 0.6);
      border-radius: 12px;
      border: 1px solid rgba(255, 215, 0, 0.3);
      gap: 12px;
    }
    
    .achievement-percentages-icon {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
      border: 2px solid rgba(255, 215, 0, 0.4);
      display: block;
      image-rendering: crisp-edges;
      /* Remove opacity transition to prevent flashing */
    }
    
    .achievement-percentages-icon-fallback {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      background: rgba(255, 215, 0, 0.2);
      border-radius: 8px;
      border: 2px solid rgba(255, 215, 0, 0.4);
      flex-shrink: 0;
    }
    
    .achievement-percentages-text {
      flex: 1;
      min-width: 0;
    }
    
    .achievement-percentages-item:last-child {
      margin-bottom: 0;
      border-bottom: none;
    }

    .achievement-percentages-game {
      font-size: 1.6rem;
      font-weight: 700;
      margin: 0 0 10px 0;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
      color: #FFD700;
      letter-spacing: 0;
      font-family: "ProggyClean Nerd Font", "Noto Color Emoji", sans-serif;
    }

    .achievement-percentages-name {
      font-size: 1.4rem;
      font-weight: 600;
      margin: 0 0 4px 0;
      color: #FFA500;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
      letter-spacing: 0;
      font-family: "ProggyClean Nerd Font", "Noto Color Emoji", sans-serif;
    }
    
    .achievement-percentages-description {
      font-size: 1.1rem;
      font-weight: 400;
      margin: 0 0 8px 0;
      color: #E6E6FA;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
      opacity: 0.9;
      line-height: 1.3;
      letter-spacing: 0;
      font-family: "ProggyClean Nerd Font", "Noto Color Emoji", sans-serif;
    }

    .achievement-percentages-progress {
      margin-top: 8px;
    }
    
    .achievement-percentages-progress-bar {
      width: 100%;
      height: 28px;
      background: rgba(60, 60, 80, 0.8);
      border: 2px solid rgba(255, 215, 0, 0.4);
      border-radius: 14px;
      overflow: hidden;
      position: relative;
      box-shadow: 
        inset 0 2px 8px rgba(0, 0, 0, 0.6),
        0 2px 4px rgba(0, 0, 0, 0.3);
    }
    
    .achievement-percentages-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #FFD700, #FFA500, #FF8C00);
      border-radius: 12px;
      transition: width 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
      box-shadow: 
        0 0 12px rgba(255, 215, 0, 0.5),
        inset 0 1px 3px rgba(255, 255, 255, 0.3);
    }
    
    .achievement-percentages-progress-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #000000;
      font-size: 1.2rem;
      font-weight: 800;
      text-shadow: 
        0 1px 3px rgba(255, 255, 255, 0.5),
        0 0 6px rgba(255, 255, 255, 0.4);
      z-index: 10;
      letter-spacing: 0;
      font-family: "ProggyClean Nerd Font", "Noto Color Emoji", sans-serif;
    }

    /* News notification styles (bottom of screen) */
    #news-notification {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(50px);
      opacity: 0;
      pointer-events: none;
      z-index: 15000;
      
      max-width: 80%;
      min-width: 600px;
      background: rgba(12, 12, 23, 0.95);
      border: 2px solid #ffd700;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 
        0 4px 20px rgba(0, 0, 0, 0.8),
        inset 0 1px 0 rgba(255, 215, 0, 0.3);
      backdrop-filter: blur(8px);
      
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #ffffff;
      
      transition: 
        transform 0.6s cubic-bezier(0.22, 1, 0.36, 1),
        opacity 0.4s ease-out;
    }

    #news-notification.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0%);
    }

    .news-header {
      color: #ffd700;
      font-size: 1.6rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 15px;
      text-shadow: 
        0 2px 4px rgba(0, 0, 0, 0.8),
        0 0 10px rgba(255, 215, 0, 0.6);
      letter-spacing: 0.1em;
    }

    .news-content {
      display: flex;
      flex-direction: column;

  <script>
    // ===========================
    // THREE.JS INTRO ANIMATION
    // ===========================
    
    const introCanvas = document.getElementById('intro-canvas');
    let introScene, introCamera, introRenderer;
    let introTextMesh, fireTexture, fireMaterial;
    let introAnimationId;
    let introActive = false;
    let time = 0;
    
    function initThreeJsIntro() {
      // Scene
      introScene = new THREE.Scene();
      
      // Camera
      introCamera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );
      introCamera.position.z = 8;
      
      // Renderer
      introRenderer = new THREE.WebGLRenderer({
        canvas: introCanvas,
        alpha: true,
        antialias: true
      });
      introRenderer.setSize(window.innerWidth, window.innerHeight);
      introRenderer.setClearColor(0x000000, 0);
      
      // Create fire text
      createFireText();
      
      // Lighting for depth
      const ambientLight = new THREE.AmbientLight(0xff6600, 0.3);
      introScene.add(ambientLight);
      
      const pointLight = new THREE.PointLight(0xff4400, 1.5, 100);
      pointLight.position.set(0, 2, 5);
      introScene.add(pointLight);
      
      console.log('[intro] Three.js fire intro initialized');
    }
    
    function createFireText() {
      // Wait for font to load before creating texture
      document.fonts.ready.then(() => {
        createTextureAndShader();
      });
    }
    
    function createTextureAndShader() {
      // Create canvas for text
      const canvas = document.createElement('canvas');
      canvas.width = 2048;
      canvas.height = 1024; // Taller for flames extending above
      const ctx = canvas.getContext('2d');
      
      // Use exact ProggyClean Nerd Font that's loaded
      ctx.font = 'bold 220px "ProggyClean Nerd Font", "ProggyCleanNerdFontMono-Regular"';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = 'white';
      
      // Draw text at TOP so flames trail DOWN below it
      const textY = canvas.height * 0.25; // Top 25% - flames will trail downward
      ctx.fillText('The Cam Bros', canvas.width / 2, textY);
      
      // Create texture from text
      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;
      
      // Fire shader uniforms
      const fireUniforms = {
        time: { value: 0.0 },
        textTexture: { value: texture },
        color1: { value: new THREE.Color(0xffffff) }, // White hot tips
        color2: { value: new THREE.Color(0xffaa00) }, // Yellow-orange
        color3: { value: new THREE.Color(0xff3000) }, // Red base
        resolution: { value: new THREE.Vector2(canvas.width, canvas.height) }
      };
      
      // Vertex shader
      const vertexShader = `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `;
      
      // Fragment shader with flames extending beyond text
      const fragmentShader = `
        uniform float time;
        uniform sampler2D textTexture;
        uniform vec3 color1;
        uniform vec3 color2;
        uniform vec3 color3;
        uniform vec2 resolution;
        varying vec2 vUv;
        
        // Better noise function
        float hash(vec2 p) {
          return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
        }
        
        float noise(vec2 p) {
          vec2 i = floor(p);
          vec2 f = fract(p);
          f = f * f * (3.0 - 2.0 * f);
          
          float a = hash(i);
          float b = hash(i + vec2(1.0, 0.0));
          float c = hash(i + vec2(0.0, 1.0));
          float d = hash(i + vec2(1.0, 1.0));
          
          return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
        }
        
        float fbm(vec2 p) {
          float value = 0.0;
          float amplitude = 0.5;
          
          for(int i = 0; i < 6; i++) {
            value += amplitude * noise(p);
            p *= 2.0;
            amplitude *= 0.5;
          }
          return value;
        }
        
        void main() {
          vec2 uv = vUv;
          vec4 textColor = texture2D(textTexture, uv);
          
          float t = time * 0.8;
          
          // Multi-layer turbulence
          float noise1 = fbm(vec2(uv.x * 3.0 + t * 0.1, uv.y * 2.0 - t * 0.6));
          float noise2 = fbm(vec2(uv.x * 5.0 - t * 0.15, uv.y * 4.0 - t * 1.2));
          float turbulence = noise1 * 0.6 + noise2 * 0.4;
          
          // Initialize fire intensity
          float fireIntensity = 0.0;
          
          // Text is the base of the fire
          if(textColor.a > 0.1) {
            fireIntensity = textColor.a;
          }
          
          // EXTEND FLAMES DOWNWARD FROM TEXT (like real fire dripping/trailing down)
          float flameSource = 0.0;
          
          // Check ABOVE for text (creates flames trailing DOWNWARD)
          for(float dy = 0.05; dy < 0.6; dy += 0.05) {
            // Look UP (decrease y) to find text above
            vec2 samplePos = vec2(uv.x + (turbulence - 0.5) * 0.08, uv.y - dy);
            vec4 aboveText = texture2D(textTexture, samplePos);
            
            if(aboveText.a > 0.1) {
              // Found text above current pixel - create flame trailing DOWN
              float distance = dy;
              float flameHeight = turbulence * 0.5 + 0.4; // Long trailing flames
              
              if(distance < flameHeight) {
                float strength = (1.0 - distance / flameHeight) * aboveText.a;
                flameSource = max(flameSource, strength * 0.95);
              }
            }
          }
          
          // Combine text and flames extending from it
          fireIntensity = max(fireIntensity, flameSource);
          
          if(fireIntensity < 0.05) {
            discard;
          }
          
          // Heat calculation - hotter at top (text), cooler as flames trail down
          float heightFactor = 1.0 - uv.y; // Hotter at top (lower Y), cooler at bottom
          float heat = fireIntensity * heightFactor;
          heat += turbulence * 0.3;
          heat = clamp(heat, 0.0, 1.2);
          
          // Intense flickering
          float flicker = sin(time * 20.0 + uv.x * 40.0) * 0.08 + 
                         sin(time * 12.0 + uv.y * 25.0) * 0.05 + 0.92;
          heat *= flicker;
          
          // Fire color gradient - realistic fire colors
          vec3 fireColor;
          if(heat > 0.8) {
            // White hot tips
            fireColor = mix(color2, color1, (heat - 0.8) / 0.4);
          } else if(heat > 0.45) {
            // Orange to yellow
            fireColor = mix(color3, color2, (heat - 0.45) / 0.35);
          } else {
            // Dark red base
            fireColor = mix(vec3(0.2, 0.0, 0.0), color3, heat / 0.45);
          }
          
          // Glow
          float glow = pow(heat, 0.8) * 2.0;
          fireColor *= glow;
          
          // Alpha falloff for smooth edges
          float alpha = fireIntensity * (0.5 + heat * 0.5);
          
          gl_FragColor = vec4(fireColor, alpha);
        }
      `;
      
      fireMaterial = new THREE.ShaderMaterial({
        uniforms: fireUniforms,
        vertexShader: vertexShader,
        fragmentShader: fragmentShader,
        transparent: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        side: THREE.DoubleSide
      });
      
      // Create plane for fire text (taller for flames)
      const geometry = new THREE.PlaneGeometry(16, 8);
      introTextMesh = new THREE.Mesh(geometry, fireMaterial);
      introTextMesh.position.set(0, 0, 0);
      introScene.add(introTextMesh);
      
      console.log('[intro] Fire text created with ProggyClean font');
    }
    
    function animateIntro() {
      if (!introActive) return;
      
      introAnimationId = requestAnimationFrame(animateIntro);
      
      time += 0.016; // ~60fps
      
      // Update fire shader
      if (fireMaterial) {
        fireMaterial.uniforms.time.value = time;
      }
      
      // NO movement - keep text stationary so fire looks good
      
      introRenderer.render(introScene, introCamera);

    function ensureAudioContext() {
      if (!audioCtx) {

    function setupAnalyserForAudio(audio) {
      const ctx = ensureAudioContext();
      if (!ctx) return;

      analyser = ctx.createAnalyser();
      analyser.fftSize = 512;

      const source = ctx.createMediaElementSource(audio);
      source.connect(analyser);
      analyser.connect(ctx.destination);

      const bufferLength = analyser.frequencyBinCount;
      dataArray = new Uint8Array(bufferLength);
    }

    function applyTransform(el, state) {

    function spawnBurstWord() {
      // Use synonyms if available, otherwise fall back to wordBurstText
      let word;
      
      if (wordBurstSynonyms && wordBurstSynonyms.length > 0) {
        // Get next synonym in sequence (cycle through them)
        word = wordBurstSynonyms[synonymIndex % wordBurstSynonyms.length];
        synonymIndex++;
      } else if (wordBurstText) {
        // Fallback to original behavior
        word = wordBurstText;
      } else {
        return;  // Nothing to display
      }

      const el = document.createElement("div");
      el.className = "burst-word";
      el.textContent = word;

      const x = 8 + Math.random() * 84; // vw
      const y = 8 + Math.random() * 68; // vh

      const fontSize = 2.0 + Math.random() * 4.0; // rem
      const dur = 0.55 + Math.random() * 0.45;    // 0.55–1.0s

      el.style.left = x + "vw";
      el.style.top = y + "vh";
      el.style.fontSize = fontSize + "rem";
      el.style.animationDuration = dur + "s";

      document.body.appendChild(el);
      el.addEventListener("animationend", () => {
        el.remove();
      });
    }

    function animateMeme(myMemeId, media) {
      if (rafId) {
        cancelAnimationFrame(rafId);
        rafId = null;
      }

      function step() {
        if (myMemeId !== activeMemeId) return;

        const ended = !media || media.ended || media.paused;
        const dur = (media && media.duration) || 1;
        const t = media
          ? Math.min(Math.max(media.currentTime / dur, 0), 1)
          : 0;

        const baseScale = 0.3 + (3.2 - 0.3) * t;

        let opacity;
        if (t < 0.12) {
          opacity = t / 0.12;
        } else if (t > 0.85) {
          opacity = Math.max(0, (1 - t) / 0.15);
        } else {
          opacity = 1;
        }

        let rms = 0.0;
        if (analyser && dataArray) {
          analyser.getByteTimeDomainData(dataArray);
          let sum = 0;
          for (let i = 0; i < dataArray.length; i++) {
            const v = dataArray[i] - 128;
            sum += v * v;
          }
          rms = Math.sqrt(sum / dataArray.length) / 128;
        } else {
          rms = 0.15 + Math.random() * 0.15;
        }

        const shakeStrength = 4 + rms * 10;
        const jitterX = (Math.random() - 0.5) * shakeStrength;
        const jitterY = (Math.random() - 0.5) * shakeStrength;
        const angle = (Math.random() - 0.5) * (4 + rms * 10);
        const reactiveScale = baseScale * (1 + rms * 0.2);

        mainState = {
          x: jitterX,
          y: jitterY,
          scale: reactiveScale,
          angle: angle,
          opacity: ended ? 0 : opacity,
        };

        if (ended) {
          mainState.scale = 3.2;
          mainState.x = 0;
          mainState.y = 0;
          mainState.angle = 0;
          wordBurstActive = false;
        }

        applyTransform(memeWrapper, mainState);

        if (!ended && wordBurstActive && wordBurstText) {
          const now = performance.now();
          const loudEnough = rms > 0.12 || !analyser;
          const inWindow = t > 0.05 && t < 0.95;
          const cooldownOk = now - lastBurstMs > 140;

          if (loudEnough && inWindow && cooldownOk) {
            spawnBurstWord();  // No parameter needed - uses global state
            lastBurstMs = now;
          }
        }

        if (!ended) {
          rafId = requestAnimationFrame(step);
        }
      }

      rafId = requestAnimationFrame(step);
    }

    function parseEmojiAndCount(text) {
      if (!text) return { emoji: "", count: 0 };

      const parts = text.trim().split(/\s+/);
      const emoji = parts[0] || "";

      const match = text.match(/x\s*(\d+)/i);
      let count = match ? parseInt(match[1], 10) : 1;
      if (!Number.isFinite(count) || count < 1) count = 1;

      return { emoji, count };
    }

    function startMarqueeFromText(text, durationSec) {
      if (!text) {
        clearMarquee();
        return;
      }

      const { emoji, count } = parseEmojiAndCount(text);
      if (!emoji || count <= 0) {
        clearMarquee();
        return;
      }

      const strip = Array(count).fill(emoji).join(" ");

      marqueeTop.innerHTML = "";
      marqueeBottom.innerHTML = "";

      const topInner = document.createElement("div");
      topInner.className = "marquee-inner marquee-inner-top";
      topInner.textContent = strip;

      const bottomInner = document.createElement("div");
      bottomInner.className = "marquee-inner marquee-inner-bottom";
      bottomInner.textContent = strip;

      marqueeTop.appendChild(topInner);
      marqueeBottom.appendChild(bottomInner);

      const dur = (isFinite(durationSec) && durationSec > 0.2)
        ? durationSec
        : 4;

      marqueeTop.style.setProperty("--marquee-duration", `${dur}s`);
      marqueeBottom.style.setProperty("--marquee-duration", `${dur}s`);

      marqueeTop.classList.remove("active");
      marqueeBottom.classList.remove("active");
      void marqueeTop.offsetWidth;
      void marqueeBottom.offsetWidth;

      marqueeTop.classList.add("active");
      marqueeBottom.classList.add("active");

    // Three.js Subscribe CTA Animation - Energy Wave Effect
    function initSubscribeThreeJS() {
      const canvas = document.getElementById('subscribe-canvas');
      if (!canvas) return;

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(75, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
      const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
      renderer.setSize(canvas.clientWidth, canvas.clientHeight);
      renderer.setClearColor(0x000000, 0);

      // Create pulsing energy rings
      const rings = [];
      const ringCount = 5;
      
      for (let i = 0; i < ringCount; i++) {
        const geometry = new THREE.TorusGeometry(10 + i * 3, 0.3, 16, 100);
        const material = new THREE.MeshBasicMaterial({
          color: new THREE.Color().setHSL(0.08 - i * 0.02, 1, 0.5),
          transparent: true,
          opacity: 0.7 - i * 0.1,
          side: THREE.DoubleSide
        });
        const ring = new THREE.Mesh(geometry, material);
        ring.rotation.x = Math.PI / 2;
        ring.userData = {
          baseScale: 1 + i * 0.2,
          phase: i * Math.PI / ringCount
        };
        rings.push(ring);
        scene.add(ring);
      }

      // Create energy particles emanating from center
      const particleCount = 500;
      const particles = new THREE.BufferGeometry();
      const positions = new Float32Array(particleCount * 3);
      const velocities = [];
      const colors = new Float32Array(particleCount * 3);
      
      for (let i = 0; i < particleCount; i++) {
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.random() * Math.PI;
        const radius = Math.random() * 15;
        
        positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
        positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
        positions[i * 3 + 2] = radius * Math.cos(phi);
        
        velocities.push({
          x: (Math.random() - 0.5) * 0.1,
          y: (Math.random() - 0.5) * 0.1,
          z: (Math.random() - 0.5) * 0.1
        });
        
        const color = new THREE.Color();
        color.setHSL(Math.random() * 0.15, 1, 0.5 + Math.random() * 0.3);
        colors[i * 3] = color.r;
        colors[i * 3 + 1] = color.g;
        colors[i * 3 + 2] = color.b;
      }
      
      particles.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      particles.setAttribute('color', new THREE.BufferAttribute(colors, 3));
      
      const particleMaterial = new THREE.PointsMaterial({
        size: 0.5,
        vertexColors: true,
        transparent: true,
        opacity: 0.9,
        blending: THREE.AdditiveBlending
      });
      
      const particleSystem = new THREE.Points(particles, particleMaterial);
      scene.add(particleSystem);

      // Create glowing core sphere
      const coreGeometry = new THREE.SphereGeometry(2, 32, 32);
      const coreMaterial = new THREE.MeshBasicMaterial({
        color: 0xffaa00,
        transparent: true,
        opacity: 0.5
      });
      const core = new THREE.Mesh(coreGeometry, coreMaterial);
      scene.add(core);

      camera.position.z = 30;

      let time = 0;
      let animationId;
      
      function animate() {
        animationId = requestAnimationFrame(animate);
        time += 0.016;

        // Pulse energy rings
        rings.forEach((ring, i) => {
          const pulse = Math.sin(time * 2 + ring.userData.phase) * 0.3 + 1;
          ring.scale.set(ring.userData.baseScale * pulse, ring.userData.baseScale * pulse, 1);
          ring.rotation.z += 0.002 * (i + 1);
          ring.material.opacity = (0.7 - i * 0.1) * (0.5 + Math.sin(time * 3 + ring.userData.phase) * 0.3);
        });

        // Animate particles outward and reset
        const posAttr = particleSystem.geometry.attributes.position;
        for (let i = 0; i < particleCount; i++) {
          posAttr.array[i * 3] += velocities[i].x;
          posAttr.array[i * 3 + 1] += velocities[i].y;
          posAttr.array[i * 3 + 2] += velocities[i].z;
          
          const dist = Math.sqrt(
            posAttr.array[i * 3] ** 2 +
            posAttr.array[i * 3 + 1] ** 2 +
            posAttr.array[i * 3 + 2] ** 2
          );
          
          if (dist > 25) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.random() * Math.PI;
            const radius = Math.random() * 3;
            
            posAttr.array[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
            posAttr.array[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
            posAttr.array[i * 3 + 2] = radius * Math.cos(phi);
          }
        }
        posAttr.needsUpdate = true;

        // Pulse core
        const coreScale = 1 + Math.sin(time * 4) * 0.2;
        core.scale.set(coreScale, coreScale, coreScale);
        core.rotation.y += 0.01;

        renderer.render(scene, camera);
      }

      animate();

      // Cleanup function
      window.subscribeThreeCleanup = () => {
        cancelAnimationFrame(animationId);
        scene.traverse((object) => {
          if (object.geometry) object.geometry.dispose();
          if (object.material) {
            if (Array.isArray(object.material)) {
              object.material.forEach(mat => mat.dispose());
            } else {
              object.material.dispose();
            }
          }
        });
        renderer.dispose();
        window.subscribeThreeCleanup = null;
      };
    }

    function playSoundAndAnimate(soundUrl, memeUrl, videoUrl, audioDuration = 0) {
      const hasVideo = !!videoUrl;
      const hasMeme = !!memeUrl;

      if (!hasVideo && !hasMeme) {
        clearMeme();
        clearMarquee();
        wordBurstActive = false;
        return;
      }

      const myMemeId = ++activeMemeId;

      // stop previous media
      if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
      }
      if (currentVideo) {
        currentVideo.pause();
        currentVideo = null;
      }
      if (rafId) {
        cancelAnimationFrame(rafId);
        rafId = null;
      }

      clearMarquee();
      resetStates();

      memeImg.style.display = "none";
      memeVideo.style.display = "none";
      memeYouTube.style.display = "none";

      wordBurstText = parseEventWord(lastText, lastAction);
      wordBurstActive = false;
      lastBurstMs = 0;

      // -------- VIDEO MODE (all videos are now cached locally as MP4) --------
      if (hasVideo) {
        console.log(`[video] Loading cached video: ${videoUrl}`);
        
        // Create fresh video element for reliable playback
        const newVideo = document.createElement("video");
        newVideo.id = "meme-video";
        newVideo.style.width = "80vw";
        newVideo.style.maxHeight = "80vh";
        newVideo.style.borderRadius = "1rem";
        newVideo.style.objectFit = "contain";
        newVideo.style.boxShadow = "none";
        newVideo.style.background = "transparent";
        newVideo.style.border = "none";
        newVideo.style.display = "block";
        newVideo.muted = false;
        newVideo.autoplay = false;  // Don't autoplay yet
        newVideo.playsInline = true;
        newVideo.preload = "auto";
        newVideo.controls = false;
        newVideo.volume = 1.0;
        
        // Replace old video element
        memeWrapper.replaceChild(newVideo, memeVideo);
        memeVideo = newVideo;
        currentVideo = memeVideo;

        // Set up loading timeout - longer for videos
        let loadTimeout = setTimeout(() => {
          if (myMemeId === activeMemeId) {
            console.warn(`[video] Load timeout for ${videoUrl}`);
            clearMeme();
            clearMarquee();
          }
        }, 20000); // 20 second timeout for video loading

        const loadedHandler = () => {
          clearTimeout(loadTimeout);
          if (myMemeId !== activeMemeId) return;
          
          // Use the actual video duration - no artificial limits
          const videoDuration = memeVideo.duration || lastVideoDuration || 10;
          console.log(`[video] Video loaded successfully: duration=${videoDuration}s`);
          
          // Check if this is a Tenor video (short GIF-style) vs YouTube/full video
          // The backend now properly detects the source and sends appropriate audio pairing
          // We can detect the type from whether external audio is provided
          const hasExternalAudio = !!soundUrl && soundUrl.trim() !== '';
          const isTenorVideo = hasExternalAudio;  // If Discord audio is sent, it's a Tenor video
          const isYouTubeVideo = !hasExternalAudio && hasVideo; // If no external audio, it's YouTube
          
          console.log(`[video] Video classification: hasExternalAudio=${hasExternalAudio}, isTenor=${isTenorVideo}, isYouTube=${isYouTubeVideo}`);
          
          let playbackDuration = videoDuration;
          let shouldLoop = false;
          let useExternalAudio = false;
          
          if (isTenorVideo && soundUrl && audioDuration > 0) {
            // Tenor + Discord audio: use backend-calculated audio duration for reliable sync
            playbackDuration = audioDuration;
            shouldLoop = true;
            useExternalAudio = true;
            console.log(`[video] Tenor video with Discord audio - using backend audio duration: ${playbackDuration}s, looping enabled`);
            
            // Load and setup Discord audio for Tenor videos
            currentAudio = new Audio();
            currentAudio.src = withCacheBuster(soundUrl);
            currentAudio.volume = 0.7;
            currentAudio.preload = "auto";
            setupAnalyserForAudio(currentAudio);
            
          } else if (isTenorVideo) {
            // Tenor without audio: use video duration, don't loop
            shouldLoop = false;
            console.log(`[video] Tenor video without audio - using video duration: ${playbackDuration}s`);
          } else if (isYouTubeVideo) {
            // YouTube/full video: use video's own audio, ignore any external audio
            playbackDuration = videoDuration;
            shouldLoop = false;
            useExternalAudio = false;
            console.log(`[video] YouTube/full video - using video's own audio, duration: ${playbackDuration}s`);
            
            // For YouTube videos, make sure video audio is enabled
            memeVideo.muted = false;
            memeVideo.volume = 0.8;
          }
          
          // Enable looping only for Tenor videos that need to sync with audio
          memeVideo.loop = shouldLoop;
          if (shouldLoop) {
            console.log(`[video] Enabled looping for Tenor video`);
          }
          
          if (lastText) {
            startMarqueeFromText(lastText, playbackDuration + 0.5);
          }

          wordBurstText = parseEventWord(lastText, lastAction);
          wordBurstActive = !!wordBurstText;

          // Start playing video and optionally external audio
          const playVideo = () => {
            const videoPlayPromise = memeVideo.play();
            if (videoPlayPromise && typeof videoPlayPromise.then === "function") {
              videoPlayPromise
                .then(() => {
                  console.log(`[video] Video playing successfully for ${playbackDuration}s`);
                  animateMeme(myMemeId, memeVideo);
                  
                  // For Tenor videos with Discord audio, stop the video when audio ends
                  if (shouldLoop && useExternalAudio && currentAudio) {
                    currentAudio.addEventListener('ended', () => {
                      if (myMemeId === activeMemeId) {
                        console.log(`[video] Discord audio ended, stopping looped Tenor video`);
                        memeVideo.pause();
                        memeVideo.loop = false;
                        // Trigger ended handler
                        setTimeout(() => {
                          if (myMemeId === activeMemeId) {
                            clearMeme();
                            clearMarquee();
                          }
                        }, 500);
                      }
                    }, { once: true });
                  }
                })
                .catch(err => {
                  console.error(`[video] Video play failed: ${err}`);
                  if (myMemeId === activeMemeId) {
                    clearMeme();
                    clearMarquee();
                  }
                });
            } else {
              animateMeme(myMemeId, memeVideo);
            }
          };

          // Start external audio for Tenor videos if needed
          if (useExternalAudio && currentAudio) {
            console.log(`[video] Starting external audio for Tenor video`);
            const ctx = ensureAudioContext();
            if (ctx && ctx.state === "suspended") {
              ctx.resume().catch(() => {});
            }

            const audioPlayPromise = currentAudio.play();
            if (audioPlayPromise && typeof audioPlayPromise.then === "function") {
              audioPlayPromise
                .then(() => {
                  console.log(`[video] External audio playing successfully`);
                  // Start video playback synchronized with audio
                  playVideo();
                })
                .catch(err => {
                  console.warn(`[video] External audio play failed: ${err}`);
                  // Continue with video only
                  currentAudio = null;
                  playVideo();
                });
            } else {
              playVideo();
            }
          } else {
            // No external audio needed (YouTube videos or silent Tenor)
            playVideo();
          }
        };

        const endedHandler = () => {
          console.log(`[video] Video ended naturally`);
          if (myMemeId === activeMemeId) {
            wordBurstActive = false;
            setTimeout(() => {
              if (myMemeId === activeMemeId) {
                clearMeme();
                clearMarquee();
              }
            }, 500); // Small delay after video ends
          }
        };

        const errorHandler = (e) => {
          clearTimeout(loadTimeout);
          console.error(`[video] Video error:`, e);
          if (myMemeId === activeMemeId) {
            clearMeme();
            clearMarquee();
            wordBurstActive = false;
          }
        };

        // Attach event listeners
        memeVideo.addEventListener("loadedmetadata", loadedHandler, { once: true });
        memeVideo.addEventListener("ended", endedHandler, { once: true });
        memeVideo.addEventListener("error", errorHandler, { once: true });

        // Load the video with cache buster
        memeVideo.src = withCacheBuster(videoUrl);
        memeVideo.load();

        return;
      }

      // -------- GIF + AUDIO MODE --------
      console.log(`[media] Loading GIF+Audio mode - meme:${memeUrl} sound:${soundUrl}`);

      const bustUrl = withCacheBuster(memeUrl);
      const preloader = new Image();

      preloader.onload = () => {
        if (myMemeId !== activeMemeId) return;

        const newMain = new Image();
        newMain.id = "meme-img";
        newMain.alt = "meme";
        newMain.src = bustUrl;
        newMain.style.width = "80vw";
        newMain.style.maxHeight = "80vh";
        newMain.style.borderRadius = "1rem";
        newMain.style.objectFit = "contain";
        newMain.style.boxShadow = "none";
        newMain.style.display = "block";

        memeWrapper.replaceChild(newMain, memeImg);
        memeImg = newMain;

        let audio = null;
        if (soundUrl) {
          console.log(`[audio] Loading cached audio: ${soundUrl}`);
          audio = new Audio();
          audio.src = withCacheBuster(soundUrl);
          audio.volume = 0.7;
          audio.preload = "auto";
          currentAudio = audio;
          setupAnalyserForAudio(audio);

          audio.addEventListener("loadedmetadata", () => {
            // Use backend-calculated duration if available, otherwise fallback to browser detection
            const total = audioDuration > 0 ? audioDuration : (audio.duration || 1);
            const marqueeDuration = total + 0.25;
            console.log(`[audio] Audio loaded: duration=${total}s (backend: ${audioDuration}s, browser: ${audio.duration}s)`);
            if (lastText) {
              startMarqueeFromText(lastText, marqueeDuration);
            }
          });

          audio.addEventListener("error", (e) => {
            console.error(`[audio] Audio error:`, e);
            if (myMemeId === activeMemeId) {
              currentAudio = null;
              // Continue with visual meme without audio
            }
          });

          wordBurstActive = !!wordBurstText;
        }

        mainState.opacity = 1;
        applyTransform(memeWrapper, mainState);

        if (audio) {
          const ctx = ensureAudioContext();
          if (ctx && ctx.state === "suspended") {
            ctx.resume().catch(() => {});
          }

          const playPromise = audio.play();
          if (playPromise && typeof playPromise.then === "function") {
            playPromise
              .then(() => {
                if (myMemeId === activeMemeId) {
                  console.log(`[audio] Audio playing successfully`);
                  animateMeme(myMemeId, audio);
                }
              })
              .catch(err => {
                console.warn(`[audio] Audio play failed, using fake driver:`, err);
                if (myMemeId !== activeMemeId) return;
                currentAudio = null;
                
                // Use backend-calculated duration if available, otherwise fallback
                const fallbackDuration = audioDuration > 0 ? audioDuration : 1.3;
                const fake = { duration: fallbackDuration, currentTime: 0, paused: false, ended: false };
                const start = performance.now();
                if (lastText) {
                  startMarqueeFromText(lastText, fallbackDuration + 0.05);
                }
                wordBurstActive = !!wordBurstText;

                function fakeStep(now) {
                  const elapsed = (now - start) / 1000;
                  fake.currentTime = elapsed;
                  if (elapsed >= fake.duration) {
                    fake.paused = true;
                    fake.ended = true;
                  }
                  animateMeme(myMemeId, fake);
                  if (!fake.ended) {
                    rafId = requestAnimationFrame(fakeStep);
                  } else {
                    wordBurstActive = false;
                    setTimeout(() => {
                      if (myMemeId === activeMemeId) {
                        clearMeme();
                        clearMarquee();
                      }
                    }, 250);
                  }
                }

                rafId = requestAnimationFrame(fakeStep);
              });
          } else {
            animateMeme(myMemeId, audio);
          }

          audio.addEventListener("ended", () => {
            if (myMemeId === activeMemeId) {
              console.log(`[audio] Audio ended`);
              wordBurstActive = false;
              setTimeout(() => {
                if (myMemeId === activeMemeId) {
                  clearMeme();
                  clearMarquee();
                }
              }, 250);
            }
          });
        } else {
          console.log(`[media] No audio, using fake timing for GIF`);
          // Use a reasonable default duration if no audio duration is provided
          const defaultDuration = audioDuration > 0 ? audioDuration : 3.0;
          const fake = { duration: defaultDuration, currentTime: 0, paused: false, ended: false };
          const start = performance.now();

          if (lastText) {
            startMarqueeFromText(lastText, defaultDuration + 0.25);
          }
          wordBurstActive = !!wordBurstText;

          function fakeStep(now) {
            const elapsed = (now - start) / 1000;
            fake.currentTime = elapsed;
            if (elapsed >= fake.duration) {
              fake.paused = true;
              fake.ended = true;
            }
            animateMeme(myMemeId, fake);
            if (!fake.ended) {
              rafId = requestAnimationFrame(fakeStep);
            } else {
              wordBurstActive = false;
              setTimeout(() => {
                if (myMemeId === activeMemeId) {
                  clearMeme();
                  clearMarquee();
                }
              }, 250);
            }
          }

          rafId = requestAnimationFrame(fakeStep);
        }
      };

      preloader.onerror = () => {
        console.error(`[media] Image preload failed for: ${bustUrl}`);
        if (myMemeId === activeMemeId) {
          clearMeme();
          clearMarquee();
          wordBurstActive = false;
        }
      };

      // Start loading the image
      console.log(`[media] Preloading image: ${bustUrl}`);
      preloader.src = bustUrl;
    }

    // Create confetti particles for thank you animation
    function createConfetti(container) {
      // Clear existing particles
      container.innerHTML = '';
      
      const colors = ['#FFD700', '#FF69B4', '#00CED1', '#FF6347', '#7FFF00', '#FF1493'];
      const symbols = ['❤️', '⭐', '🎉', '✨', '💖', '🌟'];
      
      // Create 30 particles
      for (let i = 0; i < 30; i++) {
        const particle = document.createElement('div');
        particle.style.position = 'absolute';
        particle.style.fontSize = '30px';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = '-50px';
        particle.style.animation = `confetti-fall ${2 + Math.random() * 2}s linear ${Math.random() * 0.5}s`;
        particle.style.zIndex = '10';
        particle.textContent = symbols[Math.floor(Math.random() * symbols.length)];
        container.appendChild(particle);
      }
      
      // Clean up particles after animation
      setTimeout(() => {
        container.innerHTML = '';
      }, 5000);
    }

    async function pollOverlay() {
      try {
        const res = await fetch("/overlay", { cache: "no-store" });
        if (!res.ok) return;

        const data = await res.json();
        const text = data.text || "";
        const action = (data.action || "").toLowerCase();
        const sound = data.sound || "";
        const meme = data.meme || "";
        const video = data.video || "";
        const videoDuration = data.video_duration || 0;
        const audioDuration = data.audio_duration || 0;
        const synonyms = Array.isArray(data.synonyms) ? data.synonyms : [];
        const runs = Array.isArray(data.runs) ? data.runs : [];
        const achievement = data.achievement || null;
        const playtime = data.playtime || null;
        const achievement_percentages = data.achievement_percentages || null;
        const news = data.news || null;
        const caption = data.caption || "";
        const thanksName = data.thanks_name || "";
        const thanksStyle = data.thanks_style || 0;

        // Update live captions
        const captionEl = document.getElementById('live-caption');
        if (caption && caption.trim()) {
          captionEl.textContent = caption;
          captionEl.classList.add('visible');
        } else {
          captionEl.classList.remove('visible');
        }

        // Handle thank you animations
        const thanksOverlay = document.getElementById('thanks-overlay');
        const thanksNameEl = thanksOverlay.querySelector('.thanks-name');
        
        if (thanksName && thanksName.trim()) {
          // Update name
          thanksNameEl.textContent = thanksName;
          
          // Apply style
          thanksOverlay.className = 'thanks-overlay active style-' + thanksStyle;
          
          // Create confetti particles
          createConfetti(thanksOverlay.querySelector('.thanks-particles'));
        } else {
          thanksOverlay.classList.remove('active');
        }

        // Handle achievement notifications
        const achievementChanged = !lastAchievement && achievement || 
                                 lastAchievement && !achievement ||
                                 lastAchievement && achievement && 
                                 (lastAchievement.achievement_title !== achievement.achievement_title ||
                                  lastAchievement.unlock_time !== achievement.unlock_time);
        
        if (achievementChanged) {
          showAchievement(achievement);
          lastAchievement = achievement;
        }

        // Handle playtime notifications
        const playtimeChanged = !lastPlaytime && playtime || 
                               lastPlaytime && !playtime ||
                               lastPlaytime && playtime && 
                               (lastPlaytime.game_name !== playtime.game_name ||
                                lastPlaytime.timestamp !== playtime.timestamp);
        
        if (playtimeChanged) {
          showPlaytime(playtime);
          lastPlaytime = playtime;
        }

        // Handle achievement percentages notifications
        // Only show if data exists and actually changed (hash check inside showAchievementPercentages)
        if (achievement_percentages) {
          showAchievementPercentages(achievement_percentages);
        } else if (!achievement_percentages && lastAchievementPercentages) {
          // Hide if went from having data to not having data
          hideAchievementPercentages();
          lastAchievementPercentages = null;
        }

        // Handle news notifications
        const newsChanged = !lastNews && news || 
                           lastNews && !news ||
                           lastNews && news && 
                           (lastNews.game_name !== news.game_name ||
                            lastNews.timestamp !== news.timestamp);
        
        if (newsChanged) {
          showNews(news);
          lastNews = news;
        }

        // Handle subscribe CTA notifications (backend-triggered)
        const subscribe_cta = data.subscribe_cta || null;
        if (subscribe_cta && subscribe_cta.trigger && !subscribeCTA.classList.contains('visible')) {
          showSubscribeCTA();
        }

        // Handle merch CTA notifications (backend-triggered)
        const merch_cta = data.merch_cta || null;
        if (merch_cta && merch_cta.trigger && !merchCTA.classList.contains('visible')) {
          showMerchCTA();
        }

        // Handle intro notifications (backend-triggered)
        const intro = data.intro || null;
        if (intro && intro.trigger) {
          showIntro();
          
          // Auto-hide after remaining time
          const remainingTime = (intro.remaining_time || 8) * 1000;
          setTimeout(() => {
            hideIntro();
          }, remainingTime);
          
          console.log(`[intro] Triggered Three.js intro for ${remainingTime/1000}s`);
        }

        const prevRunsLen = lastRunsSnapshot.length;

        renderRuns(runs);
        lastRunsSnapshot = runs.slice();

        const hasRuns = runs && runs.length > 0;
        if (text && hasRuns) {
          runsPanel.classList.add("visible");
        } else {
          runsPanel.classList.remove("visible");
        }

        const isRunEndEvent =
          action && action.includes("run") && action.includes("end");

        const changed =
          text !== lastText ||
          action !== lastAction ||
          sound !== lastSound ||
          meme !== lastMeme ||
          video !== lastVideo ||
          videoDuration !== lastVideoDuration;

        if (isRunEndEvent && runs.length > prevRunsLen) {
          highlightLatestRunRow();
        }

        if (!changed) return;

        lastText = text;
        lastAction = action;
        lastSound = sound;
        lastMeme = meme;
        lastVideo = video;
        lastVideoDuration = videoDuration;
        
        // Update burst word synonyms
        if (synonyms && synonyms.length > 0) {
          wordBurstSynonyms = synonyms;
          synonymIndex = 0;  // Reset to start of synonym list
          console.log(`[synonyms] Loaded ${synonyms.length} synonyms:`, synonyms.slice(0, 5));
        } else {
          wordBurstSynonyms = [];
        }

        if (!text) {
          boxEl.classList.remove("visible");
          boxEl.classList.remove("flash");
          textEl.textContent = "";
          clearMeme();
          clearMarquee();
          return;
        }

        textEl.textContent = text;
        applyTheme(action);

        boxEl.classList.add("visible");
        triggerFlash();

        if (meme || video) {
          playSoundAndAnimate(sound, meme, video, audioDuration);
        } else {
          clearMeme();
          clearMarquee();
        }
      } catch (err) {
        console.error("Overlay poll error:", err);
      }
    }

    pollOverlay();
    setInterval(pollOverlay, POLL_INTERVAL_MS);
    
    // Check if test mode is enabled via URL parameter (?test=1)
    const urlParams = new URLSearchParams(window.location.search);
    const testMode = urlParams.get('test') === '1';
    
    if (testMode) {
      console.log('🧪 TEST MODE ENABLED - CTAs will show in 5 and 10 seconds (client-side test)');
      // Show subscribe CTA after 5 seconds
      setTimeout(() => {
        console.log('🧪 TEST: Showing subscribe CTA');
        showSubscribeCTA();
      }, 5000);
      
      // Show merch CTA after 10 seconds
      setTimeout(() => {
        console.log('🧪 TEST: Showing merch CTA');
        showMerchCTA();
      }, 10000);
    }
    
    // CTAs are now backend-controlled via /overlay endpoint
    console.log('[cta] CTAs controlled by backend scheduler - no client-side timers');
  </script>
</body>
</html>
